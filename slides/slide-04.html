<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #eef8ee;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
</style>
</head>
<body>
  <h1 style="font-size: 30pt; font-weight: 800; color: #3a8a3a; margin-top: 24pt; letter-spacing: -0.02em;">추피의 친구들</h1>
  <p style="font-size: 13pt; color: #6aaa6a; margin-top: 4pt; margin-bottom: 20pt;">함께라서 더 즐거워요!</p>

  <!-- Friends row -->
  <div style="display: flex; align-items: flex-end; justify-content: center; gap: 40pt; flex: 1; padding-bottom: 36pt;">

    <!-- Lalou -->
    <div style="display: flex; flex-direction: column; align-items: center;">
      <svg width="120" height="170" viewBox="0 0 120 170">
        <!-- Body (brown bear-like) -->
        <ellipse cx="60" cy="102" rx="36" ry="46" fill="#c4956a"/>
        <!-- Belly -->
        <ellipse cx="60" cy="110" rx="24" ry="30" fill="#f5e0c4"/>
        <!-- Head -->
        <ellipse cx="60" cy="46" rx="30" ry="27" fill="#c4956a"/>
        <!-- Ears -->
        <circle cx="36" cy="24" r="10" fill="#c4956a"/>
        <circle cx="36" cy="24" r="6" fill="#f5e0c4"/>
        <circle cx="84" cy="24" r="10" fill="#c4956a"/>
        <circle cx="84" cy="24" r="6" fill="#f5e0c4"/>
        <!-- Eyes -->
        <ellipse cx="48" cy="43" rx="8" ry="10" fill="#ffffff"/>
        <ellipse cx="72" cy="43" rx="8" ry="10" fill="#ffffff"/>
        <circle cx="50" cy="44" r="4" fill="#1a1a1a"/>
        <circle cx="70" cy="44" r="4" fill="#1a1a1a"/>
        <circle cx="52" cy="41" r="1.5" fill="#ffffff"/>
        <circle cx="72" cy="41" r="1.5" fill="#ffffff"/>
        <!-- Nose -->
        <ellipse cx="60" cy="54" rx="5" ry="3.5" fill="#8b6544"/>
        <!-- Mouth -->
        <path d="M55 58 Q60 64 65 58" stroke="#8b6544" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Arms -->
        <path d="M26 94 Q16 102 19 114" stroke="#c4956a" stroke-width="10" fill="none" stroke-linecap="round"/>
        <path d="M94 94 Q104 102 101 114" stroke="#c4956a" stroke-width="10" fill="none" stroke-linecap="round"/>
        <!-- Feet -->
        <ellipse cx="44" cy="147" rx="14" ry="7" fill="#c4956a"/>
        <ellipse cx="76" cy="147" rx="14" ry="7" fill="#c4956a"/>
        <!-- Blush -->
        <ellipse cx="38" cy="55" rx="6" ry="3.5" fill="#ffb3b3" opacity="0.4"/>
        <ellipse cx="82" cy="55" rx="6" ry="3.5" fill="#ffb3b3" opacity="0.4"/>
      </svg>
      <div style="background: #ffffff; border-radius: 16pt; padding: 6pt 16pt; box-shadow: 0 2pt 6pt rgba(0,0,0,0.08); margin-top: 6pt;">
        <p style="font-size: 14pt; font-weight: 700; color: #c4956a; text-align: center;">랄루</p>
        <p style="font-size: 9pt; color: #999; text-align: center;">추피의 단짝 친구</p>
      </div>
    </div>

    <!-- Tchoupi center -->
    <div style="display: flex; flex-direction: column; align-items: center;">
      <svg width="130" height="185" viewBox="0 0 130 185">
        <!-- Body -->
        <ellipse cx="65" cy="110" rx="38" ry="50" fill="#3a3a3a"/>
        <!-- Belly -->
        <ellipse cx="65" cy="118" rx="25" ry="33" fill="#ffffff"/>
        <!-- Head -->
        <ellipse cx="65" cy="50" rx="30" ry="28" fill="#3a3a3a"/>
        <!-- Eyes -->
        <ellipse cx="53" cy="47" rx="10" ry="12" fill="#ffffff"/>
        <ellipse cx="77" cy="47" rx="10" ry="12" fill="#ffffff"/>
        <circle cx="55" cy="48" r="5" fill="#1a1a1a"/>
        <circle cx="75" cy="48" r="5" fill="#1a1a1a"/>
        <circle cx="57" cy="45" r="2" fill="#ffffff"/>
        <circle cx="77" cy="45" r="2" fill="#ffffff"/>
        <!-- Beak -->
        <ellipse cx="65" cy="62" rx="6" ry="3.5" fill="#ff9933"/>
        <path d="M60 65 Q65 72 70 65" stroke="#ff9933" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Hat -->
        <ellipse cx="65" cy="27" rx="20" ry="8" fill="#ff6b6b"/>
        <rect x="48" y="20" width="34" height="10" rx="5" fill="#ff6b6b"/>
        <circle cx="65" cy="16" r="6" fill="#ff6b6b"/>
        <!-- Arms open wide -->
        <path d="M30 100 Q10 85 15 70" stroke="#3a3a3a" stroke-width="10" fill="none" stroke-linecap="round"/>
        <path d="M100 100 Q120 85 115 70" stroke="#3a3a3a" stroke-width="10" fill="none" stroke-linecap="round"/>
        <!-- Feet -->
        <ellipse cx="48" cy="158" rx="14" ry="7" fill="#ff9933"/>
        <ellipse cx="82" cy="158" rx="14" ry="7" fill="#ff9933"/>
        <!-- Blush -->
        <ellipse cx="40" cy="60" rx="6" ry="4" fill="#ffb3b3" opacity="0.5"/>
        <ellipse cx="90" cy="60" rx="6" ry="4" fill="#ffb3b3" opacity="0.5"/>
      </svg>
      <div style="background: #ff6b6b; border-radius: 16pt; padding: 6pt 16pt; box-shadow: 0 2pt 6pt rgba(0,0,0,0.08); margin-top: 6pt;">
        <p style="font-size: 14pt; font-weight: 700; color: #ffffff; text-align: center;">추피</p>
      </div>
    </div>

    <!-- Pilou -->
    <div style="display: flex; flex-direction: column; align-items: center;">
      <svg width="120" height="170" viewBox="0 0 120 170">
        <!-- Body (rabbit-like) -->
        <ellipse cx="60" cy="102" rx="34" ry="44" fill="#aab8d0"/>
        <!-- Belly -->
        <ellipse cx="60" cy="110" rx="22" ry="28" fill="#e8edf5"/>
        <!-- Head -->
        <ellipse cx="60" cy="48" rx="28" ry="25" fill="#aab8d0"/>
        <!-- Long ears -->
        <ellipse cx="44" cy="10" rx="8" ry="24" fill="#aab8d0" transform="rotate(-10 44 10)"/>
        <ellipse cx="44" cy="10" rx="4" ry="18" fill="#dcc8e8" transform="rotate(-10 44 10)"/>
        <ellipse cx="76" cy="10" rx="8" ry="24" fill="#aab8d0" transform="rotate(10 76 10)"/>
        <ellipse cx="76" cy="10" rx="4" ry="18" fill="#dcc8e8" transform="rotate(10 76 10)"/>
        <!-- Eyes -->
        <ellipse cx="48" cy="45" rx="9" ry="10" fill="#ffffff"/>
        <ellipse cx="72" cy="45" rx="9" ry="10" fill="#ffffff"/>
        <circle cx="50" cy="46" r="4.5" fill="#1a1a1a"/>
        <circle cx="70" cy="46" r="4.5" fill="#1a1a1a"/>
        <circle cx="52" cy="43" r="1.8" fill="#ffffff"/>
        <circle cx="72" cy="43" r="1.8" fill="#ffffff"/>
        <!-- Nose -->
        <ellipse cx="60" cy="55" rx="4" ry="3" fill="#e89aab"/>
        <!-- Mouth -->
        <path d="M55 59 Q60 65 65 59" stroke="#c0808f" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Whiskers -->
        <line x1="35" y1="53" x2="48" y2="55" stroke="#8899aa" stroke-width="1"/>
        <line x1="35" y1="58" x2="48" y2="58" stroke="#8899aa" stroke-width="1"/>
        <line x1="72" y1="55" x2="85" y2="53" stroke="#8899aa" stroke-width="1"/>
        <line x1="72" y1="58" x2="85" y2="58" stroke="#8899aa" stroke-width="1"/>
        <!-- Arms -->
        <path d="M28 94 Q18 102 21 114" stroke="#aab8d0" stroke-width="10" fill="none" stroke-linecap="round"/>
        <path d="M92 94 Q102 102 99 114" stroke="#aab8d0" stroke-width="10" fill="none" stroke-linecap="round"/>
        <!-- Feet -->
        <ellipse cx="44" cy="145" rx="14" ry="8" fill="#aab8d0"/>
        <ellipse cx="76" cy="145" rx="14" ry="8" fill="#aab8d0"/>
        <!-- Blush -->
        <ellipse cx="38" cy="56" rx="6" ry="3.5" fill="#ffb3b3" opacity="0.4"/>
        <ellipse cx="82" cy="56" rx="6" ry="3.5" fill="#ffb3b3" opacity="0.4"/>
      </svg>
      <div style="background: #ffffff; border-radius: 16pt; padding: 6pt 16pt; box-shadow: 0 2pt 6pt rgba(0,0,0,0.08); margin-top: 6pt;">
        <p style="font-size: 14pt; font-weight: 700; color: #7788aa; text-align: center;">필루</p>
        <p style="font-size: 9pt; color: #999; text-align: center;">함께 뛰어노는 친구</p>
      </div>
    </div>
  </div>

  <!-- Grass decoration at bottom -->
  <svg style="position:absolute;bottom:0;left:0;" width="720" height="30" viewBox="0 0 720 30">
    <path d="M0 30 Q30 10 60 30 Q90 10 120 30 Q150 10 180 30 Q210 10 240 30 Q270 10 300 30 Q330 10 360 30 Q390 10 420 30 Q450 10 480 30 Q510 10 540 30 Q570 10 600 30 Q630 10 660 30 Q690 10 720 30" fill="#8dc88d" opacity="0.3"/>
  </svg>
</body>
</html>
