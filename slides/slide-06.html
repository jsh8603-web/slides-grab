<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #fffde8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
</style>
</head>
<body>
  <h1 style="font-size: 26pt; font-weight: 800; color: #d4a020; margin-bottom: 14pt; letter-spacing: -0.02em; position: absolute; top: 18pt;">추피가 좋아하는 것들</h1>

  <!-- Radial layout: Tchoupi center, icons around -->
  <div style="position: relative; width: 500pt; height: 320pt; margin-top: 20pt;">

    <!-- Center: Tchoupi -->
    <div style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);">
      <svg width="120" height="140" viewBox="0 0 120 140">
        <ellipse cx="60" cy="85" rx="32" ry="40" fill="#3a3a3a"/>
        <ellipse cx="60" cy="92" rx="20" ry="26" fill="#ffffff"/>
        <ellipse cx="60" cy="40" rx="24" ry="22" fill="#3a3a3a"/>
        <ellipse cx="50" cy="38" rx="8" ry="10" fill="#ffffff"/>
        <ellipse cx="70" cy="38" rx="8" ry="10" fill="#ffffff"/>
        <circle cx="52" cy="39" r="4" fill="#1a1a1a"/>
        <circle cx="68" cy="39" r="4" fill="#1a1a1a"/>
        <circle cx="54" cy="36" r="1.5" fill="#ffffff"/>
        <circle cx="70" cy="36" r="1.5" fill="#ffffff"/>
        <ellipse cx="60" cy="50" rx="5" ry="3" fill="#ff9933"/>
        <path d="M56 53 Q60 59 64 53" stroke="#ff9933" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Hat -->
        <ellipse cx="60" cy="22" rx="16" ry="6" fill="#ff6b6b"/>
        <rect x="47" y="17" width="26" height="7" rx="3" fill="#ff6b6b"/>
        <circle cx="60" cy="14" r="5" fill="#ff6b6b"/>
        <!-- Happy arms up -->
        <path d="M30 78 Q15 60 25 48" stroke="#3a3a3a" stroke-width="8" fill="none" stroke-linecap="round"/>
        <path d="M90 78 Q105 60 95 48" stroke="#3a3a3a" stroke-width="8" fill="none" stroke-linecap="round"/>
        <!-- Feet -->
        <ellipse cx="44" cy="124" rx="12" ry="6" fill="#ff9933"/>
        <ellipse cx="76" cy="124" rx="12" ry="6" fill="#ff9933"/>
        <!-- Blush -->
        <ellipse cx="40" cy="50" rx="5" ry="3" fill="#ffb3b3" opacity="0.5"/>
        <ellipse cx="80" cy="50" rx="5" ry="3" fill="#ffb3b3" opacity="0.5"/>
      </svg>
    </div>

    <!-- Connecting lines (subtle) -->
    <svg style="position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;" viewBox="0 0 500 320">
      <line x1="250" y1="120" x2="130" y2="38" stroke="#e8d88a" stroke-width="1.5" stroke-dasharray="4,4"/>
      <line x1="250" y1="120" x2="370" y2="38" stroke="#e8d88a" stroke-width="1.5" stroke-dasharray="4,4"/>
      <line x1="220" y1="160" x2="68" y2="155" stroke="#e8d88a" stroke-width="1.5" stroke-dasharray="4,4"/>
      <line x1="280" y1="160" x2="432" y2="155" stroke="#e8d88a" stroke-width="1.5" stroke-dasharray="4,4"/>
      <line x1="250" y1="200" x2="130" y2="278" stroke="#e8d88a" stroke-width="1.5" stroke-dasharray="4,4"/>
      <line x1="250" y1="200" x2="370" y2="278" stroke="#e8d88a" stroke-width="1.5" stroke-dasharray="4,4"/>
    </svg>

    <!-- Icon 1: Toy blocks (top-left) -->
    <div style="position: absolute; left: 60pt; top: 0pt; display: flex; flex-direction: column; align-items: center;">
      <div style="width: 64pt; height: 64pt; background: #ffe0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <svg width="36" height="36" viewBox="0 0 36 36">
          <rect x="2" y="16" width="14" height="14" rx="2" fill="#ff6b6b"/>
          <rect x="20" y="16" width="14" height="14" rx="2" fill="#4a90d9"/>
          <rect x="10" y="4" width="14" height="14" rx="2" fill="#66bb6a"/>
        </svg>
      </div>
      <p style="font-size: 11pt; font-weight: 600; color: #666; margin-top: 4pt;">장난감 블록</p>
    </div>

    <!-- Icon 2: Drawing (top-right) -->
    <div style="position: absolute; right: 60pt; top: 0pt; display: flex; flex-direction: column; align-items: center;">
      <div style="width: 64pt; height: 64pt; background: #e0f0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <svg width="36" height="36" viewBox="0 0 36 36">
          <rect x="4" y="4" width="28" height="28" rx="3" fill="#ffffff" stroke="#66bb6a" stroke-width="2"/>
          <circle cx="14" cy="14" r="4" fill="#ffd700"/>
          <path d="M8 28 L14 18 L20 24 L26 14 L32 28" fill="#87ceeb" opacity="0.5"/>
          <path d="M4 28 L12 20 L18 24 L28 12" stroke="#66bb6a" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <p style="font-size: 11pt; font-weight: 600; color: #666; margin-top: 4pt;">그림 그리기</p>
    </div>

    <!-- Icon 3: Playing with friends (middle-left) -->
    <div style="position: absolute; left: 0pt; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center;">
      <div style="width: 64pt; height: 64pt; background: #e0e8ff; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <svg width="40" height="36" viewBox="0 0 40 36">
          <circle cx="12" cy="10" r="6" fill="#3a3a3a"/>
          <ellipse cx="12" cy="26" rx="8" ry="10" fill="#3a3a3a"/>
          <circle cx="28" cy="10" r="6" fill="#c4956a"/>
          <ellipse cx="28" cy="26" rx="8" ry="10" fill="#c4956a"/>
          <!-- Heart between them -->
          <path d="M20 16l-0.8-0.7C17.4 13.6 16 12.5 16 11.2 16 10.1 16.9 9.2 18 9.2c0.6 0 1.2.3 1.6.7.4-.4 1-.7 1.6-.7 1.1 0 2 .9 2 2.1 0 1.3-1.4 2.4-3.2 4.1L20 16z" fill="#ff6b6b" opacity="0.7"/>
        </svg>
      </div>
      <p style="font-size: 11pt; font-weight: 600; color: #666; margin-top: 4pt;">친구와 놀기</p>
    </div>

    <!-- Icon 4: Animals (middle-right) -->
    <div style="position: absolute; right: 0pt; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center;">
      <div style="width: 64pt; height: 64pt; background: #fff0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <svg width="36" height="36" viewBox="0 0 36 36">
          <!-- Cat -->
          <ellipse cx="18" cy="22" rx="10" ry="11" fill="#ffbb66"/>
          <circle cx="18" cy="12" r="8" fill="#ffbb66"/>
          <!-- Ears -->
          <polygon points="11,6 8,0 14,4" fill="#ffbb66"/>
          <polygon points="25,6 28,0 22,4" fill="#ffbb66"/>
          <polygon points="11.5,6.5 9,1.5 13.5,4.5" fill="#ffa0a0"/>
          <polygon points="24.5,6.5 27,1.5 22.5,4.5" fill="#ffa0a0"/>
          <!-- Eyes -->
          <circle cx="14" cy="12" r="2" fill="#1a1a1a"/>
          <circle cx="22" cy="12" r="2" fill="#1a1a1a"/>
          <!-- Nose -->
          <ellipse cx="18" cy="15" rx="1.5" ry="1" fill="#ff8888"/>
          <!-- Whiskers -->
          <line x1="8" y1="14" x2="14" y2="15" stroke="#cc8844" stroke-width="0.8"/>
          <line x1="8" y1="17" x2="14" y2="16" stroke="#cc8844" stroke-width="0.8"/>
          <line x1="22" y1="15" x2="28" y2="14" stroke="#cc8844" stroke-width="0.8"/>
          <line x1="22" y1="16" x2="28" y2="17" stroke="#cc8844" stroke-width="0.8"/>
          <!-- Tail -->
          <path d="M28 24 Q34 20 32 14" stroke="#ffbb66" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <p style="font-size: 11pt; font-weight: 600; color: #666; margin-top: 4pt;">동물 친구들</p>
    </div>

    <!-- Icon 5: Snacks (bottom-left) -->
    <div style="position: absolute; left: 60pt; bottom: 0pt; display: flex; flex-direction: column; align-items: center;">
      <div style="width: 64pt; height: 64pt; background: #ffe8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <svg width="36" height="36" viewBox="0 0 36 36">
          <!-- Cookie -->
          <circle cx="18" cy="18" r="14" fill="#d4956a"/>
          <circle cx="12" cy="14" r="2.5" fill="#6b3a1a"/>
          <circle cx="22" cy="12" r="2" fill="#6b3a1a"/>
          <circle cx="16" cy="22" r="2.5" fill="#6b3a1a"/>
          <circle cx="24" cy="22" r="2" fill="#6b3a1a"/>
          <circle cx="18" cy="16" r="1.5" fill="#6b3a1a"/>
        </svg>
      </div>
      <p style="font-size: 11pt; font-weight: 600; color: #666; margin-top: 4pt;">맛있는 간식</p>
    </div>

    <!-- Icon 6: Reading (bottom-right) -->
    <div style="position: absolute; right: 60pt; bottom: 0pt; display: flex; flex-direction: column; align-items: center;">
      <div style="width: 64pt; height: 64pt; background: #e8e0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <svg width="36" height="36" viewBox="0 0 36 36">
          <!-- Open book -->
          <path d="M18 8 L4 10 L4 30 L18 28 Z" fill="#4a90d9"/>
          <path d="M18 8 L32 10 L32 30 L18 28 Z" fill="#5aa0e9"/>
          <!-- Pages -->
          <line x1="8" y1="14" x2="16" y2="13" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
          <line x1="8" y1="18" x2="16" y2="17" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
          <line x1="8" y1="22" x2="16" y2="21" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
          <line x1="20" y1="13" x2="28" y2="14" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
          <line x1="20" y1="17" x2="28" y2="18" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
          <line x1="20" y1="21" x2="28" y2="22" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
          <!-- Spine -->
          <line x1="18" y1="8" x2="18" y2="28" stroke="#3a6a9a" stroke-width="1.5"/>
        </svg>
      </div>
      <p style="font-size: 11pt; font-weight: 600; color: #666; margin-top: 4pt;">책 읽기</p>
    </div>
  </div>
</body>
</html>
