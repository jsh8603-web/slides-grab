<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #eef8f8;
    display: flex;
    overflow: hidden;
    position: relative;
  }
</style>
</head>
<body>
  <!-- Left: Book covers -->
  <div style="width: 55%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative;">
    <!-- Stacked book covers -->
    <svg width="340" height="350" viewBox="0 0 340 350">
      <!-- Book 4 (back) -->
      <g transform="translate(160, 20) rotate(6)">
        <rect x="0" y="0" width="120" height="160" rx="6" fill="#b8d8b8" stroke="#8ab88a" stroke-width="2"/>
        <rect x="10" y="15" width="100" height="8" rx="2" fill="#ffffff" opacity="0.6"/>
        <rect x="10" y="30" width="70" height="6" rx="2" fill="#ffffff" opacity="0.4"/>
        <!-- Mini Tchoupi on cover -->
        <ellipse cx="60" cy="95" rx="20" ry="25" fill="#3a3a3a"/>
        <ellipse cx="60" cy="100" rx="13" ry="16" fill="#ffffff"/>
        <circle cx="60" cy="72" r="16" fill="#3a3a3a"/>
        <ellipse cx="54" cy="70" rx="5" ry="6" fill="#ffffff"/>
        <ellipse cx="66" cy="70" rx="5" ry="6" fill="#ffffff"/>
        <circle cx="55" cy="71" r="2.5" fill="#1a1a1a"/>
        <circle cx="65" cy="71" r="2.5" fill="#1a1a1a"/>
        <ellipse cx="60" cy="79" rx="3" ry="2" fill="#ff9933"/>
        <ellipse cx="60" cy="58" rx="10" ry="4" fill="#ff6b6b"/>
        <rect x="52" y="55" width="16" height="5" rx="2" fill="#ff6b6b"/>
        <!-- Stars -->
        <circle cx="20" cy="140" r="3" fill="#ffd700" opacity="0.5"/>
        <circle cx="100" cy="140" r="3" fill="#ffd700" opacity="0.5"/>
      </g>

      <!-- Book 3 -->
      <g transform="translate(100, 30) rotate(-4)">
        <rect x="0" y="0" width="120" height="160" rx="6" fill="#ffd4a8" stroke="#e8b888" stroke-width="2"/>
        <rect x="10" y="15" width="100" height="8" rx="2" fill="#ffffff" opacity="0.6"/>
        <rect x="10" y="30" width="80" height="6" rx="2" fill="#ffffff" opacity="0.4"/>
        <!-- Mini Tchoupi with food -->
        <ellipse cx="60" cy="95" rx="20" ry="25" fill="#3a3a3a"/>
        <ellipse cx="60" cy="100" rx="13" ry="16" fill="#ffffff"/>
        <circle cx="60" cy="72" r="16" fill="#3a3a3a"/>
        <ellipse cx="54" cy="70" rx="5" ry="6" fill="#ffffff"/>
        <ellipse cx="66" cy="70" rx="5" ry="6" fill="#ffffff"/>
        <circle cx="55" cy="71" r="2.5" fill="#1a1a1a"/>
        <circle cx="65" cy="71" r="2.5" fill="#1a1a1a"/>
        <ellipse cx="60" cy="79" rx="3" ry="2" fill="#ff9933"/>
        <ellipse cx="60" cy="58" rx="10" ry="4" fill="#ff6b6b"/>
        <rect x="52" y="55" width="16" height="5" rx="2" fill="#ff6b6b"/>
        <!-- Spoon -->
        <rect x="82" y="80" width="3" height="20" rx="1" fill="#aaaaaa"/>
        <ellipse cx="83.5" cy="78" rx="5" ry="4" fill="#aaaaaa"/>
      </g>

      <!-- Book 2 -->
      <g transform="translate(40, 50) rotate(3)">
        <rect x="0" y="0" width="120" height="160" rx="6" fill="#c8d4f8" stroke="#a8b8e8" stroke-width="2"/>
        <rect x="10" y="15" width="100" height="8" rx="2" fill="#ffffff" opacity="0.6"/>
        <rect x="10" y="30" width="60" height="6" rx="2" fill="#ffffff" opacity="0.4"/>
        <!-- Mini Tchoupi sleeping -->
        <ellipse cx="60" cy="100" rx="30" ry="12" fill="#e8ddf5"/>
        <rect x="30" y="90" width="60" height="18" rx="6" fill="#b8a8d8"/>
        <circle cx="60" cy="82" r="16" fill="#3a3a3a"/>
        <path d="M50 82 Q54 79 58 82" stroke="#ffffff" stroke-width="1.2" fill="none"/>
        <path d="M62 82 Q66 79 70 82" stroke="#ffffff" stroke-width="1.2" fill="none"/>
        <ellipse cx="60" cy="89" rx="3" ry="2" fill="#ff9933"/>
        <ellipse cx="60" cy="68" rx="10" ry="4" fill="#ff6b6b"/>
        <rect x="52" y="65" width="16" height="5" rx="2" fill="#ff6b6b"/>
        <!-- Zzz -->
        <text x="78" y="74" font-size="10" fill="#b8a8d8" font-weight="700">z</text>
        <text x="84" y="66" font-size="8" fill="#b8a8d8" font-weight="700">z</text>
      </g>

      <!-- Book 1 (front) -->
      <g transform="translate(20, 140) rotate(-2)">
        <rect x="0" y="0" width="130" height="170" rx="6" fill="#ffb8b8" stroke="#e89898" stroke-width="2"/>
        <rect x="10" y="15" width="110" height="8" rx="2" fill="#ffffff" opacity="0.6"/>
        <rect x="10" y="30" width="90" height="6" rx="2" fill="#ffffff" opacity="0.4"/>
        <!-- Mini Tchoupi with backpack -->
        <ellipse cx="65" cy="100" rx="22" ry="28" fill="#3a3a3a"/>
        <ellipse cx="65" cy="106" rx="14" ry="18" fill="#ffffff"/>
        <circle cx="65" cy="76" r="18" fill="#3a3a3a"/>
        <ellipse cx="58" cy="74" rx="6" ry="7" fill="#ffffff"/>
        <ellipse cx="72" cy="74" rx="6" ry="7" fill="#ffffff"/>
        <circle cx="59" cy="75" r="3" fill="#1a1a1a"/>
        <circle cx="71" cy="75" r="3" fill="#1a1a1a"/>
        <circle cx="60" cy="73" r="1.2" fill="#ffffff"/>
        <circle cx="72" cy="73" r="1.2" fill="#ffffff"/>
        <ellipse cx="65" cy="84" rx="4" ry="2.5" fill="#ff9933"/>
        <path d="M62 86 Q65 91 68 86" stroke="#ff9933" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <ellipse cx="65" cy="61" rx="12" ry="5" fill="#ff6b6b"/>
        <rect x="56" y="57" width="18" height="6" rx="3" fill="#ff6b6b"/>
        <circle cx="65" cy="55" r="4" fill="#ff6b6b"/>
        <!-- Backpack -->
        <rect x="82" y="90" width="14" height="18" rx="4" fill="#4a90d9"/>
        <!-- Feet -->
        <ellipse cx="52" cy="128" rx="10" ry="5" fill="#ff9933"/>
        <ellipse cx="78" cy="128" rx="10" ry="5" fill="#ff9933"/>
        <!-- Stars decoration -->
        <path d="M15 150 l2 5h5l-4 3 1.5 5-4.5-3-4.5 3 1.5-5-4 3h5z" fill="#ffd700" opacity="0.5"/>
        <path d="M108 150 l2 5h5l-4 3 1.5 5-4.5-3-4.5 3 1.5-5-4 3h5z" fill="#ffd700" opacity="0.5"/>
      </g>
    </svg>
  </div>

  <!-- Right: Book list -->
  <div style="width: 45%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 28pt 24pt;">
    <p style="display: inline-block; padding: 5pt 14pt; background: #2aaa9a; color: #ffffff; border-radius: 20pt; font-size: 10pt; font-weight: 600; letter-spacing: 0.02em; margin-bottom: 14pt; width: fit-content;">BOOK SERIES</p>

    <h1 style="font-size: 26pt; font-weight: 800; color: #2a2a2a; letter-spacing: -0.02em; margin-bottom: 20pt;">추피와 함께<br>다양한 이야기를!</h1>

    <div style="display: flex; flex-direction: column; gap: 12pt;">
      <div style="display: flex; align-items: center; gap: 10pt;">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z" fill="#ffd700"/></svg>
        <p style="font-size: 15pt; font-weight: 600; color: #444;">"추피, 학교에 가다"</p>
      </div>
      <div style="display: flex; align-items: center; gap: 10pt;">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff6b6b"/></svg>
        <p style="font-size: 15pt; font-weight: 600; color: #444;">"추피, 아기가 생겼어요"</p>
      </div>
      <div style="display: flex; align-items: center; gap: 10pt;">
        <svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#b8a8d8"/><path d="M9 14 Q9 10 12 10 Q15 10 15 14" stroke="#ffffff" stroke-width="1.5" fill="none"/><circle cx="12" cy="8" r="2" fill="#ffd700"/></svg>
        <p style="font-size: 15pt; font-weight: 600; color: #444;">"추피, 잘 자요"</p>
      </div>
      <div style="display: flex; align-items: center; gap: 10pt;">
        <svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#ff9933"/><path d="M8 10 Q8 8 10 8 L14 8 Q16 8 16 10 L16 16 Q16 18 14 18 L10 18 Q8 18 8 16 Z" fill="#ffffff" opacity="0.6"/></svg>
        <p style="font-size: 15pt; font-weight: 600; color: #444;">"추피, 밥 먹기 싫어!"</p>
      </div>
    </div>

    <div style="margin-top: 22pt; padding: 10pt 16pt; background: #d4f0ee; border-radius: 10pt;">
      <p style="font-size: 11pt; color: #2a8a7a; font-weight: 500;">세계 50개국, 3,000만 부 이상 판매!</p>
    </div>
  </div>
</body>
</html>
