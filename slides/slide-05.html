<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #f5f0ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
</style>
</head>
<body>
  <h1 style="font-size: 28pt; font-weight: 800; color: #6a5acd; margin-top: 18pt; letter-spacing: -0.02em;">추피의 하루</h1>
  <p style="font-size: 11pt; color: #9a8ad0; margin-top: 2pt; margin-bottom: 12pt;">추피의 하루는 신나는 일로 가득해요</p>

  <!-- 2x2 Grid -->
  <div style="display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12pt; width: 660pt; flex: 1; padding: 0 16pt 18pt 16pt;">

    <!-- Morning -->
    <div style="background: #fff8e8; border-radius: 16pt; padding: 14pt; display: flex; align-items: center; gap: 14pt; position: relative; overflow: hidden;">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <!-- Sun -->
        <circle cx="85" cy="20" r="14" fill="#ffd700" opacity="0.4"/>
        <!-- Tchoupi with towel -->
        <ellipse cx="55" cy="65" rx="25" ry="32" fill="#3a3a3a"/>
        <ellipse cx="55" cy="72" rx="16" ry="20" fill="#ffffff"/>
        <ellipse cx="55" cy="35" rx="20" ry="18" fill="#3a3a3a"/>
        <ellipse cx="46" cy="33" rx="7" ry="8" fill="#ffffff"/>
        <ellipse cx="64" cy="33" rx="7" ry="8" fill="#ffffff"/>
        <circle cx="47" cy="34" r="3.5" fill="#1a1a1a"/>
        <circle cx="63" cy="34" r="3.5" fill="#1a1a1a"/>
        <circle cx="49" cy="32" r="1.2" fill="#ffffff"/>
        <circle cx="65" cy="32" r="1.2" fill="#ffffff"/>
        <ellipse cx="55" cy="44" rx="4" ry="2.5" fill="#ff9933"/>
        <path d="M52 46 Q55 51 58 46" stroke="#ff9933" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <!-- Hat -->
        <ellipse cx="55" cy="20" rx="13" ry="5" fill="#ff6b6b"/>
        <rect x="44" y="16" width="22" height="6" rx="3" fill="#ff6b6b"/>
        <circle cx="55" cy="13" r="4" fill="#ff6b6b"/>
        <!-- Toothbrush -->
        <rect x="75" y="40" width="3" height="22" rx="1" fill="#66bb6a"/>
        <rect x="72" y="36" width="9" height="6" rx="2" fill="#ffffff" stroke="#66bb6a" stroke-width="1"/>
        <ellipse cx="37" cy="96" rx="10" ry="5" fill="#ff9933"/>
        <ellipse cx="73" cy="96" rx="10" ry="5" fill="#ff9933"/>
      </svg>
      <div style="display: flex; flex-direction: column; gap: 4pt;">
        <p style="font-size: 10pt; font-weight: 600; color: #e8a030; letter-spacing: 0.02em;">MORNING</p>
        <h2 style="font-size: 18pt; font-weight: 700; color: #555;">아침이 밝았어요</h2>
        <p style="font-size: 11pt; color: #888; line-height: 1.5;">세수하고 이를 닦아요</p>
      </div>
      <!-- Sun rays decoration -->
      <svg style="position:absolute;top:-5pt;right:-5pt;opacity:0.15;" width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="25" fill="#ffd700"/>
      </svg>
    </div>

    <!-- Daytime -->
    <div style="background: #e8f8e8; border-radius: 16pt; padding: 14pt; display: flex; align-items: center; gap: 14pt; position: relative; overflow: hidden;">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <!-- Tchoupi with backpack -->
        <ellipse cx="55" cy="65" rx="25" ry="32" fill="#3a3a3a"/>
        <ellipse cx="55" cy="72" rx="16" ry="20" fill="#ffffff"/>
        <ellipse cx="55" cy="35" rx="20" ry="18" fill="#3a3a3a"/>
        <ellipse cx="46" cy="33" rx="7" ry="8" fill="#ffffff"/>
        <ellipse cx="64" cy="33" rx="7" ry="8" fill="#ffffff"/>
        <circle cx="47" cy="34" r="3.5" fill="#1a1a1a"/>
        <circle cx="63" cy="34" r="3.5" fill="#1a1a1a"/>
        <circle cx="49" cy="32" r="1.2" fill="#ffffff"/>
        <circle cx="65" cy="32" r="1.2" fill="#ffffff"/>
        <ellipse cx="55" cy="44" rx="4" ry="2.5" fill="#ff9933"/>
        <path d="M52 46 Q55 51 58 46" stroke="#ff9933" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <!-- Hat -->
        <ellipse cx="55" cy="20" rx="13" ry="5" fill="#ff6b6b"/>
        <rect x="44" y="16" width="22" height="6" rx="3" fill="#ff6b6b"/>
        <circle cx="55" cy="13" r="4" fill="#ff6b6b"/>
        <!-- Backpack -->
        <rect x="68" y="50" width="18" height="22" rx="5" fill="#4a90d9"/>
        <rect x="72" y="55" width="10" height="6" rx="2" fill="#6ab0ff"/>
        <!-- Raised arm -->
        <path d="M30 58 Q15 45 20 32" stroke="#3a3a3a" stroke-width="8" fill="none" stroke-linecap="round"/>
        <ellipse cx="37" cy="96" rx="10" ry="5" fill="#ff9933"/>
        <ellipse cx="73" cy="96" rx="10" ry="5" fill="#ff9933"/>
      </svg>
      <div style="display: flex; flex-direction: column; gap: 4pt;">
        <p style="font-size: 10pt; font-weight: 600; color: #4a9a4a; letter-spacing: 0.02em;">DAYTIME</p>
        <h2 style="font-size: 18pt; font-weight: 700; color: #555;">학교에 가요</h2>
        <p style="font-size: 11pt; color: #888; line-height: 1.5;">친구들과 신나게 놀아요</p>
      </div>
    </div>

    <!-- Evening -->
    <div style="background: #e8f0ff; border-radius: 16pt; padding: 14pt; display: flex; align-items: center; gap: 14pt; position: relative; overflow: hidden;">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <!-- Bathtub -->
        <ellipse cx="55" cy="78" rx="42" ry="22" fill="#b3d9ff"/>
        <path d="M13 78 Q13 100 55 100 Q97 100 97 78" fill="#87c4ff"/>
        <!-- Bubbles -->
        <circle cx="30" cy="60" r="6" fill="#ffffff" opacity="0.7"/>
        <circle cx="22" cy="50" r="4" fill="#ffffff" opacity="0.5"/>
        <circle cx="80" cy="55" r="5" fill="#ffffff" opacity="0.6"/>
        <circle cx="88" cy="48" r="3" fill="#ffffff" opacity="0.5"/>
        <circle cx="45" cy="52" r="3.5" fill="#ffffff" opacity="0.4"/>
        <!-- Tchoupi in bath (head only) -->
        <ellipse cx="55" cy="58" rx="20" ry="18" fill="#3a3a3a"/>
        <ellipse cx="46" cy="56" rx="7" ry="8" fill="#ffffff"/>
        <ellipse cx="64" cy="56" rx="7" ry="8" fill="#ffffff"/>
        <circle cx="47" cy="57" r="3.5" fill="#1a1a1a"/>
        <circle cx="63" cy="57" r="3.5" fill="#1a1a1a"/>
        <circle cx="49" cy="55" r="1.2" fill="#ffffff"/>
        <circle cx="65" cy="55" r="1.2" fill="#ffffff"/>
        <ellipse cx="55" cy="67" rx="4" ry="2.5" fill="#ff9933"/>
        <path d="M52 69 Q55 74 58 69" stroke="#ff9933" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <!-- Hat -->
        <ellipse cx="55" cy="43" rx="13" ry="5" fill="#ff6b6b"/>
        <rect x="44" y="39" width="22" height="6" rx="3" fill="#ff6b6b"/>
        <circle cx="55" cy="36" r="4" fill="#ff6b6b"/>
        <!-- Rubber duck -->
        <ellipse cx="78" cy="70" rx="7" ry="6" fill="#ffd700"/>
        <circle cx="78" cy="64" r="5" fill="#ffd700"/>
        <ellipse cx="82" cy="63" rx="3" ry="2" fill="#ff9933"/>
        <circle cx="76" cy="62" r="1.5" fill="#1a1a1a"/>
      </svg>
      <div style="display: flex; flex-direction: column; gap: 4pt;">
        <p style="font-size: 10pt; font-weight: 600; color: #5588bb; letter-spacing: 0.02em;">EVENING</p>
        <h2 style="font-size: 18pt; font-weight: 700; color: #555;">목욕 시간이에요</h2>
        <p style="font-size: 11pt; color: #888; line-height: 1.5;">뽀득뽀득 깨끗하게!</p>
      </div>
    </div>

    <!-- Night -->
    <div style="background: #2a2850; border-radius: 16pt; padding: 14pt; display: flex; align-items: center; gap: 14pt; position: relative; overflow: hidden;">
      <!-- Stars -->
      <svg style="position:absolute;top:8pt;right:12pt;opacity:0.6;" width="80" height="40" viewBox="0 0 80 40">
        <circle cx="10" cy="10" r="2" fill="#ffd700"/>
        <circle cx="35" cy="5" r="1.5" fill="#ffd700"/>
        <circle cx="55" cy="15" r="2.5" fill="#ffd700"/>
        <circle cx="70" cy="8" r="1.5" fill="#ffd700"/>
        <circle cx="25" cy="25" r="1" fill="#ffd700"/>
        <circle cx="65" cy="30" r="1.8" fill="#ffd700"/>
      </svg>
      <svg width="110" height="110" viewBox="0 0 110 110">
        <!-- Moon -->
        <circle cx="88" cy="18" r="12" fill="#ffd700" opacity="0.4"/>
        <circle cx="92" cy="14" r="10" fill="#2a2850"/>
        <!-- Pillow -->
        <ellipse cx="55" cy="80" rx="38" ry="14" fill="#e8ddf5"/>
        <!-- Blanket -->
        <rect x="18" y="68" width="74" height="30" rx="8" fill="#b8a8d8"/>
        <!-- Tchoupi sleeping -->
        <ellipse cx="55" cy="58" rx="20" ry="18" fill="#3a3a3a"/>
        <ellipse cx="46" cy="58" rx="7" ry="3" fill="#3a3a3a"/>
        <ellipse cx="64" cy="58" rx="7" ry="3" fill="#3a3a3a"/>
        <path d="M43 58 Q46 55 49 58" stroke="#ffffff" stroke-width="1.5" fill="none"/>
        <path d="M61 58 Q64 55 67 58" stroke="#ffffff" stroke-width="1.5" fill="none"/>
        <ellipse cx="55" cy="67" rx="4" ry="2.5" fill="#ff9933"/>
        <path d="M52 69 Q55 73 58 69" stroke="#ff9933" stroke-width="1" fill="none" stroke-linecap="round"/>
        <!-- Hat -->
        <ellipse cx="55" cy="43" rx="13" ry="5" fill="#ff6b6b"/>
        <rect x="44" y="39" width="22" height="6" rx="3" fill="#ff6b6b"/>
        <circle cx="55" cy="36" r="4" fill="#ff6b6b"/>
        <!-- Zzz -->
        <text x="78" y="42" font-size="14" fill="#b8a8d8" font-weight="700" opacity="0.7">z</text>
        <text x="86" y="32" font-size="11" fill="#b8a8d8" font-weight="700" opacity="0.5">z</text>
        <text x="92" y="24" font-size="8" fill="#b8a8d8" font-weight="700" opacity="0.3">z</text>
      </svg>
      <div style="display: flex; flex-direction: column; gap: 4pt;">
        <p style="font-size: 10pt; font-weight: 600; color: #b8a8d8; letter-spacing: 0.02em;">NIGHT</p>
        <h2 style="font-size: 18pt; font-weight: 700; color: #e8e0f5;">잘 자요, 추피!</h2>
        <p style="font-size: 11pt; color: #a098c0; line-height: 1.5;">내일 또 만나요</p>
      </div>
    </div>
  </div>

  <!-- Flow arrows between grid cells -->
  <svg style="position:absolute;top:50%;left:50%;transform:translate(-50%,-54%);" width="40" height="40" viewBox="0 0 40 40" opacity="0.2">
    <circle cx="20" cy="20" r="18" fill="#6a5acd"/>
    <path d="M14 16 L26 16 M20 10 L26 16 L20 22" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  </svg>
</body>
</html>
