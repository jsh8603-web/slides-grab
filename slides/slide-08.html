<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: linear-gradient(180deg, #e0f0ff 0%, #b3d9ff 50%, #87c4ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
</style>
</head>
<body>
  <!-- Decorative clouds -->
  <svg style="position:absolute;top:15pt;left:30pt;opacity:0.5;" width="110" height="50" viewBox="0 0 110 50">
    <ellipse cx="55" cy="34" rx="50" ry="16" fill="#ffffff"/>
    <ellipse cx="32" cy="26" rx="28" ry="18" fill="#ffffff"/>
    <ellipse cx="78" cy="26" rx="24" ry="16" fill="#ffffff"/>
  </svg>
  <svg style="position:absolute;top:35pt;right:50pt;opacity:0.4;" width="90" height="40" viewBox="0 0 90 40">
    <ellipse cx="45" cy="28" rx="40" ry="14" fill="#ffffff"/>
    <ellipse cx="28" cy="20" rx="22" ry="16" fill="#ffffff"/>
    <ellipse cx="62" cy="20" rx="20" ry="14" fill="#ffffff"/>
  </svg>

  <h1 style="font-size: 28pt; font-weight: 700; color: #2a5298; margin-bottom: 12pt; letter-spacing: -0.01em; text-align: center;">추피와 함께라면<br>매일매일이 즐거워요!</h1>

  <!-- Tchoupi with open arms -->
  <svg width="240" height="220" viewBox="0 0 240 220" style="margin: 4pt 0;">
    <!-- Body -->
    <ellipse cx="120" cy="135" rx="55" ry="68" fill="#3a3a3a"/>
    <!-- Belly -->
    <ellipse cx="120" cy="148" rx="36" ry="45" fill="#ffffff"/>
    <!-- Head -->
    <ellipse cx="120" cy="62" rx="44" ry="40" fill="#3a3a3a"/>
    <!-- Eyes -->
    <ellipse cx="102" cy="58" rx="15" ry="17" fill="#ffffff"/>
    <ellipse cx="138" cy="58" rx="15" ry="17" fill="#ffffff"/>
    <circle cx="104" cy="60" r="7" fill="#1a1a1a"/>
    <circle cx="136" cy="60" r="7" fill="#1a1a1a"/>
    <circle cx="107" cy="56" r="2.5" fill="#ffffff"/>
    <circle cx="139" cy="56" r="2.5" fill="#ffffff"/>
    <!-- Beak -->
    <ellipse cx="120" cy="78" rx="8" ry="5" fill="#ff9933"/>
    <!-- Big smile -->
    <path d="M108 83 Q120 97 132 83" stroke="#ff9933" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Hat -->
    <ellipse cx="120" cy="30" rx="24" ry="10" fill="#ff6b6b"/>
    <rect x="100" y="20" width="40" height="12" rx="5" fill="#ff6b6b"/>
    <circle cx="120" cy="16" r="7" fill="#ff6b6b"/>
    <!-- Arms wide open -->
    <path d="M68 120 Q30 90 20 70" stroke="#3a3a3a" stroke-width="14" fill="none" stroke-linecap="round"/>
    <ellipse cx="18" cy="66" rx="10" ry="8" fill="#3a3a3a"/>
    <path d="M172 120 Q210 90 220 70" stroke="#3a3a3a" stroke-width="14" fill="none" stroke-linecap="round"/>
    <ellipse cx="222" cy="66" rx="10" ry="8" fill="#3a3a3a"/>
    <!-- Feet -->
    <ellipse cx="96" cy="200" rx="18" ry="9" fill="#ff9933"/>
    <ellipse cx="144" cy="200" rx="18" ry="9" fill="#ff9933"/>
    <!-- Cheek blush -->
    <ellipse cx="85" cy="76" rx="9" ry="6" fill="#ffb3b3" opacity="0.6"/>
    <ellipse cx="155" cy="76" rx="9" ry="6" fill="#ffb3b3" opacity="0.6"/>
  </svg>

  <p style="font-size: 16pt; font-weight: 500; color: #4a7ab5; text-align: center; margin-top: 4pt;">우리 아이의 첫 번째 책 친구, 추피</p>

  <!-- Decorative elements -->
  <svg style="position:absolute;bottom:20pt;left:40pt;opacity:0.4;" width="28" height="28" viewBox="0 0 24 24">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff9999"/>
  </svg>
  <svg style="position:absolute;bottom:40pt;left:80pt;opacity:0.3;" width="22" height="22" viewBox="0 0 24 24">
    <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z" fill="#ffd700"/>
  </svg>
  <svg style="position:absolute;bottom:25pt;right:35pt;opacity:0.4;" width="24" height="24" viewBox="0 0 24 24">
    <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z" fill="#ffd700"/>
  </svg>
  <svg style="position:absolute;bottom:50pt;right:70pt;opacity:0.3;" width="20" height="20" viewBox="0 0 24 24">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff9999"/>
  </svg>

  <!-- Small flower decorations -->
  <svg style="position:absolute;bottom:15pt;left:160pt;opacity:0.35;" width="20" height="20" viewBox="0 0 20 20">
    <circle cx="10" cy="6" r="4" fill="#ffaacc"/>
    <circle cx="6" cy="10" r="4" fill="#ffaacc"/>
    <circle cx="14" cy="10" r="4" fill="#ffaacc"/>
    <circle cx="10" cy="14" r="4" fill="#ffaacc"/>
    <circle cx="10" cy="10" r="3" fill="#ffd700"/>
  </svg>
  <svg style="position:absolute;bottom:30pt;right:150pt;opacity:0.3;" width="18" height="18" viewBox="0 0 20 20">
    <circle cx="10" cy="6" r="4" fill="#aaccff"/>
    <circle cx="6" cy="10" r="4" fill="#aaccff"/>
    <circle cx="14" cy="10" r="4" fill="#aaccff"/>
    <circle cx="10" cy="14" r="4" fill="#aaccff"/>
    <circle cx="10" cy="10" r="3" fill="#ffd700"/>
  </svg>
</body>
</html>
