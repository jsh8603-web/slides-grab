<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #fffcf0;
    display: flex;
    overflow: hidden;
    position: relative;
  }
</style>
</head>
<body>
  <!-- Left side: Tchoupi large illustration -->
  <div style="width: 55%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fff5e6; position: relative;">
    <svg width="320" height="360" viewBox="0 0 320 360" style="margin-top: -10pt;">
      <!-- Body -->
      <ellipse cx="160" cy="210" rx="85" ry="105" fill="#3a3a3a"/>
      <!-- Belly -->
      <ellipse cx="160" cy="230" rx="55" ry="70" fill="#ffffff"/>
      <!-- Head -->
      <ellipse cx="160" cy="105" rx="68" ry="62" fill="#3a3a3a"/>
      <!-- Left eye white -->
      <ellipse cx="135" cy="98" rx="22" ry="25" fill="#ffffff"/>
      <!-- Right eye white -->
      <ellipse cx="185" cy="98" rx="22" ry="25" fill="#ffffff"/>
      <!-- Left pupil -->
      <circle cx="138" cy="100" r="10" fill="#1a1a1a"/>
      <!-- Right pupil -->
      <circle cx="182" cy="100" r="10" fill="#1a1a1a"/>
      <!-- Left eye shine -->
      <circle cx="141" cy="95" r="4" fill="#ffffff"/>
      <!-- Right eye shine -->
      <circle cx="185" cy="95" r="4" fill="#ffffff"/>
      <!-- Beak -->
      <ellipse cx="160" cy="125" rx="12" ry="7" fill="#ff9933"/>
      <!-- Smile -->
      <path d="M150 130 Q160 142 170 130" stroke="#ff9933" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Hat -->
      <ellipse cx="160" cy="56" rx="36" ry="14" fill="#ff6b6b"/>
      <rect x="130" y="42" width="60" height="16" rx="7" fill="#ff6b6b"/>
      <circle cx="160" cy="36" r="10" fill="#ff6b6b"/>
      <!-- Arms at sides -->
      <path d="M80 195 Q60 210 65 230" stroke="#3a3a3a" stroke-width="18" fill="none" stroke-linecap="round"/>
      <path d="M240 195 Q260 210 255 230" stroke="#3a3a3a" stroke-width="18" fill="none" stroke-linecap="round"/>
      <!-- Feet -->
      <ellipse cx="128" cy="312" rx="26" ry="12" fill="#ff9933"/>
      <ellipse cx="192" cy="312" rx="26" ry="12" fill="#ff9933"/>
      <!-- Cheek blush -->
      <ellipse cx="115" cy="120" rx="12" ry="8" fill="#ffb3b3" opacity="0.6"/>
      <ellipse cx="205" cy="120" rx="12" ry="8" fill="#ffb3b3" opacity="0.6"/>

      <!-- Annotation arrows and labels -->
      <!-- Arrow to hat -->
      <line x1="230" y1="40" x2="196" y2="46" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="4,3"/>
      <circle cx="232" cy="38" r="3" fill="#ff6b6b"/>

      <!-- Arrow to eyes -->
      <line x1="248" y1="95" x2="210" y2="98" stroke="#4a90d9" stroke-width="2" stroke-dasharray="4,3"/>
      <circle cx="250" cy="94" r="3" fill="#4a90d9"/>

      <!-- Arrow to belly -->
      <line x1="248" y1="230" x2="218" y2="230" stroke="#66bb6a" stroke-width="2" stroke-dasharray="4,3"/>
      <circle cx="250" cy="230" r="3" fill="#66bb6a"/>

      <!-- Arrow to feet -->
      <line x1="248" y1="310" x2="220" y2="312" stroke="#ff9933" stroke-width="2" stroke-dasharray="4,3"/>
      <circle cx="250" cy="309" r="3" fill="#ff9933"/>
    </svg>
  </div>

  <!-- Right side: text info -->
  <div style="width: 45%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 32pt 28pt;">
    <p style="display: inline-block; padding: 5pt 14pt; background: #ff6b6b; color: #ffffff; border-radius: 20pt; font-size: 10pt; font-weight: 600; letter-spacing: 0.02em; margin-bottom: 16pt; width: fit-content;">CHARACTER</p>

    <h1 style="font-size: 32pt; font-weight: 800; color: #2a2a2a; letter-spacing: -0.02em; margin-bottom: 20pt;">추피는<br>누구일까요?</h1>

    <div style="display: flex; flex-direction: column; gap: 14pt;">
      <div style="display: flex; align-items: center; gap: 10pt;">
        <div style="width: 8pt; height: 8pt; background: #ff6b6b; border-radius: 50%;"></div>
        <p style="font-size: 14pt; font-weight: 500; color: #444;">빨간 모자가 트레이드마크!</p>
      </div>
      <div style="display: flex; align-items: center; gap: 10pt;">
        <div style="width: 8pt; height: 8pt; background: #4a90d9; border-radius: 50%;"></div>
        <p style="font-size: 14pt; font-weight: 500; color: #444;">크고 동그란 눈이 매력적이에요</p>
      </div>
      <div style="display: flex; align-items: center; gap: 10pt;">
        <div style="width: 8pt; height: 8pt; background: #66bb6a; border-radius: 50%;"></div>
        <p style="font-size: 14pt; font-weight: 500; color: #444;">하얀 배가 폭신폭신</p>
      </div>
      <div style="display: flex; align-items: center; gap: 10pt;">
        <div style="width: 8pt; height: 8pt; background: #ff9933; border-radius: 50%;"></div>
        <p style="font-size: 14pt; font-weight: 500; color: #444;">노란 발이 귀여워요</p>
      </div>
    </div>

    <div style="margin-top: 24pt; padding: 14pt 18pt; background: #fff0e0; border-radius: 12pt;">
      <p style="font-size: 12pt; color: #886644; line-height: 1.6;">프랑스에서 온 꼬마 펭귄 추피는<br>여러분과 똑같은 호기심쟁이예요!</p>
    </div>
  </div>
</body>
</html>
