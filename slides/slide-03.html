<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #fff5ee;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
</style>
</head>
<body>
  <h1 style="font-size: 30pt; font-weight: 800; color: #d45d3a; margin-top: 24pt; letter-spacing: -0.02em;">추피의 가족</h1>
  <p style="font-size: 13pt; color: #aa7766; margin-top: 4pt; margin-bottom: 16pt;">사랑이 가득한 추피네 가족을 소개해요</p>

  <!-- Family illustration area -->
  <div style="display: flex; align-items: flex-end; justify-content: center; gap: 20pt; flex: 1; padding-bottom: 30pt;">

    <!-- Papa -->
    <div style="display: flex; flex-direction: column; align-items: center;">
      <svg width="130" height="200" viewBox="0 0 130 200">
        <!-- Body -->
        <ellipse cx="65" cy="120" rx="42" ry="55" fill="#3a3a3a"/>
        <!-- Belly -->
        <ellipse cx="65" cy="130" rx="28" ry="36" fill="#ffffff"/>
        <!-- Head -->
        <ellipse cx="65" cy="55" rx="34" ry="32" fill="#3a3a3a"/>
        <!-- Eyes -->
        <ellipse cx="52" cy="52" rx="11" ry="13" fill="#ffffff"/>
        <ellipse cx="78" cy="52" rx="11" ry="13" fill="#ffffff"/>
        <circle cx="54" cy="53" r="5" fill="#1a1a1a"/>
        <circle cx="76" cy="53" r="5" fill="#1a1a1a"/>
        <circle cx="56" cy="50" r="2" fill="#ffffff"/>
        <circle cx="78" cy="50" r="2" fill="#ffffff"/>
        <!-- Beak -->
        <ellipse cx="65" cy="68" rx="6" ry="4" fill="#ff9933"/>
        <path d="M60 71 Q65 78 70 71" stroke="#ff9933" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Tie -->
        <polygon points="65,90 58,100 65,108 72,100" fill="#4a7ab5"/>
        <!-- Arms -->
        <path d="M26 110 Q15 120 18 135" stroke="#3a3a3a" stroke-width="10" fill="none" stroke-linecap="round"/>
        <path d="M104 110 Q115 120 112 135" stroke="#3a3a3a" stroke-width="10" fill="none" stroke-linecap="round"/>
        <!-- Feet -->
        <ellipse cx="48" cy="174" rx="15" ry="7" fill="#ff9933"/>
        <ellipse cx="82" cy="174" rx="15" ry="7" fill="#ff9933"/>
      </svg>
      <div style="background: #ffffff; border-radius: 16pt; padding: 5pt 14pt; box-shadow: 0 2pt 6pt rgba(0,0,0,0.08); margin-top: 4pt;">
        <p style="font-size: 13pt; font-weight: 700; color: #4a7ab5; text-align: center;">아빠</p>
      </div>
    </div>

    <!-- Maman -->
    <div style="display: flex; flex-direction: column; align-items: center;">
      <svg width="125" height="195" viewBox="0 0 125 195">
        <!-- Body -->
        <ellipse cx="62" cy="118" rx="40" ry="52" fill="#3a3a3a"/>
        <!-- Belly -->
        <ellipse cx="62" cy="128" rx="26" ry="34" fill="#ffffff"/>
        <!-- Head -->
        <ellipse cx="62" cy="54" rx="32" ry="30" fill="#3a3a3a"/>
        <!-- Eyes -->
        <ellipse cx="50" cy="51" rx="10" ry="12" fill="#ffffff"/>
        <ellipse cx="74" cy="51" rx="10" ry="12" fill="#ffffff"/>
        <circle cx="52" cy="52" r="5" fill="#1a1a1a"/>
        <circle cx="72" cy="52" r="5" fill="#1a1a1a"/>
        <circle cx="54" cy="49" r="2" fill="#ffffff"/>
        <circle cx="74" cy="49" r="2" fill="#ffffff"/>
        <!-- Beak -->
        <ellipse cx="62" cy="66" rx="6" ry="3.5" fill="#ff9933"/>
        <path d="M57 69 Q62 76 67 69" stroke="#ff9933" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Bow -->
        <path d="M42 30 Q32 22 36 36" stroke="none" fill="#ff69b4"/>
        <path d="M42 30 Q52 22 48 36" stroke="none" fill="#ff69b4"/>
        <circle cx="42" cy="33" r="4" fill="#ff69b4"/>
        <!-- Necklace -->
        <circle cx="62" cy="88" r="4" fill="#ffd700"/>
        <!-- Arms -->
        <path d="M25 108 Q14 118 17 132" stroke="#3a3a3a" stroke-width="10" fill="none" stroke-linecap="round"/>
        <path d="M99 108 Q110 118 107 132" stroke="#3a3a3a" stroke-width="10" fill="none" stroke-linecap="round"/>
        <!-- Feet -->
        <ellipse cx="45" cy="169" rx="14" ry="7" fill="#ff9933"/>
        <ellipse cx="79" cy="169" rx="14" ry="7" fill="#ff9933"/>
      </svg>
      <div style="background: #ffffff; border-radius: 16pt; padding: 5pt 14pt; box-shadow: 0 2pt 6pt rgba(0,0,0,0.08); margin-top: 4pt;">
        <p style="font-size: 13pt; font-weight: 700; color: #e8668b; text-align: center;">엄마</p>
      </div>
    </div>

    <!-- Tchoupi -->
    <div style="display: flex; flex-direction: column; align-items: center;">
      <svg width="110" height="170" viewBox="0 0 110 170">
        <!-- Body -->
        <ellipse cx="55" cy="100" rx="35" ry="45" fill="#3a3a3a"/>
        <!-- Belly -->
        <ellipse cx="55" cy="108" rx="23" ry="30" fill="#ffffff"/>
        <!-- Head -->
        <ellipse cx="55" cy="45" rx="28" ry="26" fill="#3a3a3a"/>
        <!-- Eyes -->
        <ellipse cx="44" cy="42" rx="9" ry="11" fill="#ffffff"/>
        <ellipse cx="66" cy="42" rx="9" ry="11" fill="#ffffff"/>
        <circle cx="46" cy="43" r="4.5" fill="#1a1a1a"/>
        <circle cx="64" cy="43" r="4.5" fill="#1a1a1a"/>
        <circle cx="48" cy="40" r="1.8" fill="#ffffff"/>
        <circle cx="66" cy="40" r="1.8" fill="#ffffff"/>
        <!-- Beak -->
        <ellipse cx="55" cy="56" rx="5" ry="3" fill="#ff9933"/>
        <path d="M51 59 Q55 65 59 59" stroke="#ff9933" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Hat -->
        <ellipse cx="55" cy="24" rx="18" ry="7" fill="#ff6b6b"/>
        <rect x="40" y="17" width="30" height="9" rx="4" fill="#ff6b6b"/>
        <circle cx="55" cy="14" r="5" fill="#ff6b6b"/>
        <!-- Arms -->
        <path d="M22 92 Q12 100 15 112" stroke="#3a3a3a" stroke-width="9" fill="none" stroke-linecap="round"/>
        <path d="M88 92 Q98 100 95 112" stroke="#3a3a3a" stroke-width="9" fill="none" stroke-linecap="round"/>
        <!-- Feet -->
        <ellipse cx="40" cy="144" rx="13" ry="6" fill="#ff9933"/>
        <ellipse cx="70" cy="144" rx="13" ry="6" fill="#ff9933"/>
        <!-- Blush -->
        <ellipse cx="35" cy="55" rx="6" ry="4" fill="#ffb3b3" opacity="0.5"/>
        <ellipse cx="75" cy="55" rx="6" ry="4" fill="#ffb3b3" opacity="0.5"/>
      </svg>
      <div style="background: #ff6b6b; border-radius: 16pt; padding: 5pt 14pt; box-shadow: 0 2pt 6pt rgba(0,0,0,0.08); margin-top: 4pt;">
        <p style="font-size: 13pt; font-weight: 700; color: #ffffff; text-align: center;">추피</p>
      </div>
    </div>

    <!-- Fanni (baby sister) -->
    <div style="display: flex; flex-direction: column; align-items: center;">
      <svg width="85" height="130" viewBox="0 0 85 130">
        <!-- Body -->
        <ellipse cx="42" cy="78" rx="26" ry="32" fill="#3a3a3a"/>
        <!-- Belly -->
        <ellipse cx="42" cy="84" rx="17" ry="22" fill="#ffffff"/>
        <!-- Head -->
        <ellipse cx="42" cy="36" rx="22" ry="20" fill="#3a3a3a"/>
        <!-- Eyes -->
        <ellipse cx="34" cy="34" rx="7" ry="9" fill="#ffffff"/>
        <ellipse cx="50" cy="34" rx="7" ry="9" fill="#ffffff"/>
        <circle cx="35" cy="35" r="3.5" fill="#1a1a1a"/>
        <circle cx="49" cy="35" r="3.5" fill="#1a1a1a"/>
        <circle cx="37" cy="32" r="1.5" fill="#ffffff"/>
        <circle cx="51" cy="32" r="1.5" fill="#ffffff"/>
        <!-- Beak -->
        <ellipse cx="42" cy="45" rx="4" ry="2.5" fill="#ff9933"/>
        <path d="M39 47 Q42 52 45 47" stroke="#ff9933" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <!-- Bow -->
        <path d="M34 18 Q26 12 29 23" stroke="none" fill="#ff99cc"/>
        <path d="M34 18 Q42 12 39 23" stroke="none" fill="#ff99cc"/>
        <circle cx="34" cy="20" r="3" fill="#ff99cc"/>
        <!-- Arms -->
        <path d="M18 72 Q10 78 13 88" stroke="#3a3a3a" stroke-width="7" fill="none" stroke-linecap="round"/>
        <path d="M66 72 Q74 78 71 88" stroke="#3a3a3a" stroke-width="7" fill="none" stroke-linecap="round"/>
        <!-- Feet -->
        <ellipse cx="30" cy="109" rx="11" ry="5" fill="#ff9933"/>
        <ellipse cx="54" cy="109" rx="11" ry="5" fill="#ff9933"/>
        <!-- Blush -->
        <ellipse cx="27" cy="44" rx="5" ry="3" fill="#ffb3b3" opacity="0.5"/>
        <ellipse cx="57" cy="44" rx="5" ry="3" fill="#ffb3b3" opacity="0.5"/>
      </svg>
      <div style="background: #ffffff; border-radius: 16pt; padding: 5pt 14pt; box-shadow: 0 2pt 6pt rgba(0,0,0,0.08); margin-top: 4pt;">
        <p style="font-size: 13pt; font-weight: 700; color: #e8668b; text-align: center;">파니</p>
      </div>
    </div>
  </div>

  <!-- Hearts decoration -->
  <svg style="position:absolute;top:20pt;right:30pt;opacity:0.3;" width="28" height="28" viewBox="0 0 24 24">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff6b6b"/>
  </svg>
  <svg style="position:absolute;top:55pt;right:55pt;opacity:0.2;" width="20" height="20" viewBox="0 0 24 24">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff6b6b"/>
  </svg>
  <svg style="position:absolute;bottom:25pt;left:30pt;opacity:0.25;" width="22" height="22" viewBox="0 0 24 24">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff6b6b"/>
  </svg>
</body>
</html>
