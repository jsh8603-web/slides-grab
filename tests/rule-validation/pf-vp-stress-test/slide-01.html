<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, 'Segoe UI', sans-serif;
  background: #F0FDFA;
  color: #0F172A;
  display: flex; flex-direction: column;
  padding: 22pt 32pt 20pt;
  overflow: hidden;
}
.hero-section {
  display: flex; align-items: baseline; gap: 12pt;
  margin-bottom: 8pt;
}
.hero-num {
  font-size: 42pt; font-weight: 800; color: #14B8A6;
  line-height: 1.15;
}
.hero-label {
  font-size: 14pt; font-weight: 500; color: #1E293B;
}
.title {
  font-size: 24pt; font-weight: 700; color: #1E293B;
  margin-bottom: 10pt; line-height: 1.3;
}
.grid-table {
  display: grid;
  grid-template-columns: 72pt 80pt 68pt 230pt 50pt;
  width: 100%;
  gap: 0;
  margin-bottom: 10pt;
}
.cell {
  padding: 5pt 6pt;
  font-size: 11pt;
  line-height: 1.35;
  border-bottom: 1pt solid #E2E8F0;
  display: flex; align-items: center;
}
.header-cell {
  padding: 6pt 6pt;
  font-size: 11pt; font-weight: 600;
  color: #F0FDFA;
  background: #1E293B;
  line-height: 1.35;
  display: flex; align-items: center;
}
.cell-rank {
  justify-content: center;
}
.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24pt; height: 24pt;
  border-radius: 50%;
  background: #14B8A6;
  color: #FFFFFF;
  font-size: 12pt; font-weight: 700;
  white-space: nowrap;
}
.r-odd .cell { background: #F8FFFE; }
.source {
  font-size: 10pt; color: #64748B;
  margin-top: auto;
}
</style>
</head>
<body>
  <div class="hero-section">
    <span class="hero-num">$6,340억</span>
    <span class="hero-label"><span>2030년 우주 경제 전망</span></span>
  </div>
  <div class="title"><span>주요 국가별 우주 산업 투자 현황</span></div>

  <div class="grid-table">
    <div class="header-cell"><span>국가</span></div>
    <div class="header-cell"><span>연간 투자액</span></div>
    <div class="header-cell"><span>민간 비율</span></div>
    <div class="header-cell"><span>주요 미션</span></div>
    <div class="header-cell cell-rank"><span>순위</span></div>

    <div class="cell"><span>미국</span></div>
    <div class="cell"><span>$620억</span></div>
    <div class="cell"><span>72%</span></div>
    <div class="cell"><span>아르테미스 달 착륙, 화성 탐사</span></div>
    <div class="cell cell-rank"><div class="rank-badge">1</div></div>

    <div class="r-odd" style="display:contents">
      <div class="cell"><span>중국</span></div>
      <div class="cell"><span>$140억</span></div>
      <div class="cell"><span>35%</span></div>
      <div class="cell"><span>톈궁 우주정거장 확장</span></div>
      <div class="cell cell-rank"><div class="rank-badge">2</div></div>
    </div>

    <div class="cell"><span>유럽(ESA)</span></div>
    <div class="cell"><span>$78억</span></div>
    <div class="cell"><span>48%</span></div>
    <div class="cell"><span>ExoMars 화성 로버</span></div>
    <div class="cell cell-rank"><div class="rank-badge">3</div></div>

    <div class="r-odd" style="display:contents">
      <div class="cell"><span>일본</span></div>
      <div class="cell"><span>$42억</span></div>
      <div class="cell"><span>55%</span></div>
      <div class="cell"><span>SLIM 달 착륙, H3 로켓</span></div>
      <div class="cell cell-rank"><div class="rank-badge">4</div></div>
    </div>

    <div class="cell"><span>한국</span></div>
    <div class="cell"><span>$7.2억</span></div>
    <div class="cell"><span>28%</span></div>
    <div class="cell"><span>누리호 고도화, 달 궤도선</span></div>
    <div class="cell cell-rank"><div class="rank-badge">5</div></div>
  </div>

  <p class="source"><span>Source: Euroconsult 2025, Morgan Stanley Space Economy Report</span></p>
</body>
</html>
