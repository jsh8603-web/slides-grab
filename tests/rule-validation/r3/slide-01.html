<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}
.slide {
  width: 100%; height: 100%;
  position: relative;
}
.bg-img {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}
.overlay {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: #0D2137;
  opacity: 0.6;
}
.content {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 48pt 48pt 48pt 48pt;
}
h1 {
  font-size: 32pt; font-weight: 800;
  color: #FFFFFF;
  line-height: 1.3;
  margin-bottom: 10pt;
  text-shadow: 0 2px 8pt rgba(0,0,0,0.5);
}
.subtitle {
  font-size: 16pt; font-weight: 400;
  color: #00B4D8;
  line-height: 1.4;
  margin-bottom: 16pt;
  text-shadow: 0 1px 4pt rgba(0,0,0,0.4);
}
.date {
  font-size: 12pt; font-weight: 500;
  color: #00B4D8;
  text-shadow: 0 1px 4pt rgba(0,0,0,0.4);
}
</style>
</head>
<body>
<div class="slide">
  <img class="bg-img" src="assets/slide-01-cover.png" alt="">
  <div class="overlay"></div>
  <div class="content">
    <h1><span>디지털 트윈 — 현실을 복제하는 기술</span></h1>
    <p class="subtitle"><span>$21B에서 $195B로 — 5년이 기업의 운명을 가른다</span></p>
    <p class="date"><span>2026</span></p>
  </div>
</div>
</body>
</html>
