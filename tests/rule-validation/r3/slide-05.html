<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}
.slide {
  width: 100%; height: 100%;
  position: relative;
}
.bg-img {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}
.overlay {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: #0D2137;
  opacity: 0.65;
}
.content {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  padding: 36pt 48pt 36pt 48pt;
}
h1 {
  font-size: 20pt; font-weight: 700;
  color: #FFFFFF;
  line-height: 1.3;
  margin-bottom: 14pt;
  text-shadow: 0 2px 8pt rgba(0,0,0,0.5);
}
.takeaways {
  display: flex; flex-direction: column;
  gap: 8pt;
  margin-bottom: 16pt;
  flex: 1; min-height: 0;
}
.takeaway {
  display: flex; align-items: flex-start;
  gap: 8pt;
}
.takeaway-num {
  background: #00B4D8;
  color: #0D2137;
  font-size: 10pt; font-weight: 700;
  width: 18pt; height: 18pt;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1pt;
}
.takeaway-text {
  font-size: 11pt; color: #FFFFFF;
  line-height: 1.5;
  text-shadow: 0 1px 4pt rgba(0,0,0,0.4);
}
.takeaway-bold {
  font-weight: 700;
  color: #00B4D8;
}
.cta-box {
  background: #00B4D8;
  border-radius: 6pt;
  padding: 12pt 16pt;
}
.cta-text {
  font-size: 12pt; font-weight: 700;
  color: #0D2137;
  text-align: center;
}
</style>
</head>
<body>
<div class="slide">
  <img class="bg-img" src="assets/slide-05-closing.png" alt="">
  <div class="overlay"></div>
  <div class="content">
    <h1><span>지금 시작하지 않으면 2030년에는 따라잡을 수 없다</span></h1>
    <div class="takeaways">
      <div class="takeaway">
        <div class="takeaway-num"><span>1</span></div>
        <p class="takeaway-text"><span class="takeaway-bold">임계점 돌파</span> <span>— CAGR 35~48%, 5년 내 10배 성장</span></p>
      </div>
      <div class="takeaway">
        <div class="takeaway-num"><span>2</span></div>
        <p class="takeaway-text"><span class="takeaway-bold">75% 투자 중</span> <span>— 비투자 기업은 경쟁 열위 고착화</span></p>
      </div>
      <div class="takeaway">
        <div class="takeaway-num"><span>3</span></div>
        <p class="takeaway-text"><span class="takeaway-bold">제조·아태 최고</span> <span>— CAGR 54~56%, 한국에 직접적 위협</span></p>
      </div>
      <div class="takeaway">
        <div class="takeaway-num"><span>4</span></div>
        <p class="takeaway-text"><span class="takeaway-bold">진입 장벽 하락</span> <span>— AI+IoT+5G 융합으로 효과 증대</span></p>
      </div>
    </div>
    <div class="cta-box">
      <p class="cta-text"><span>귀사의 첫 번째 디지털 트윈 후보 공정을 오늘 식별하십시오</span></p>
    </div>
  </div>
</div>
</body>
</html>
