<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F0F4F8;
  overflow: hidden;
}
.slide {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  padding: 36pt 48pt 36pt 48pt;
}
.header { margin-bottom: 14pt; }
h1 {
  font-size: 20pt; font-weight: 700;
  color: #0D2137;
  line-height: 1.3;
  margin-bottom: 4pt;
}
.sub {
  font-size: 12pt; font-weight: 400;
  color: #7B8794;
}
.flow {
  display: grid;
  grid-template-columns: 1fr 24pt 1fr 24pt 1fr 24pt 1fr;
  align-items: stretch;
  gap: 0;
  margin-bottom: 14pt;
  flex: 1; min-height: 0;
}
.layer {
  background: #FFFFFF;
  border-radius: 6pt;
  padding: 10pt;
  display: flex; flex-direction: column;
}
.layer-icon {
  font-size: 20pt;
  margin-bottom: 4pt;
}
.layer-title {
  font-size: 11pt; font-weight: 700;
  color: #0D2137;
  margin-bottom: 4pt;
}
.layer-desc {
  font-size: 10pt; font-weight: 400;
  color: #1C1C1C;
  line-height: 1.5;
}
.arrow {
  display: flex; align-items: center; justify-content: center;
  font-size: 16pt; color: #00B4D8; font-weight: 700;
}
.case-box {
  background: #0D2137;
  border-radius: 6pt;
  padding: 10pt 14pt;
}
.case-tag {
  font-size: 10pt; font-weight: 600;
  color: #00B4D8;
  margin-bottom: 4pt;
}
.case-text {
  font-size: 11pt; font-weight: 400;
  color: #FFFFFF;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <h1><span>AI·IoT·5G 융합이 단순 모델을 실시간 의사결정 엔진으로 전환시킨다</span></h1>
    <p class="sub"><span>디지털 트윈 4단 아키텍처</span></p>
  </div>
  <div class="flow">
    <div class="layer">
      <p class="layer-icon"><span>📡</span></p>
      <p class="layer-title"><span>물리 센서</span></p>
      <p class="layer-desc"><span>IoT 기기가 실시간 물리 데이터 수집</span></p>
    </div>
    <div class="arrow"><span>→</span></div>
    <div class="layer">
      <p class="layer-icon"><span>☁️</span></p>
      <p class="layer-title"><span>디지털 미러</span></p>
      <p class="layer-desc"><span>클라우드에 물리 객체의 동적 복제본 생성</span></p>
    </div>
    <div class="arrow"><span>→</span></div>
    <div class="layer">
      <p class="layer-icon"><span>🧠</span></p>
      <p class="layer-title"><span>AI 분석</span></p>
      <p class="layer-desc"><span>시뮬레이션·예측·최적화 자동 수행</span></p>
    </div>
    <div class="arrow"><span>→</span></div>
    <div class="layer">
      <p class="layer-icon"><span>⚡</span></p>
      <p class="layer-title"><span>실시간 제어</span></p>
      <p class="layer-desc"><span>5G 초저지연 양방향 동기화 루프</span></p>
    </div>
  </div>
  <div class="case-box">
    <p class="case-tag"><span>사례 — Siemens Digital Twin Composer (2026.01)</span></p>
    <p class="case-text"><span>AI + 시뮬레이션 + 실시간 물리 데이터를 결합하여 설계-운영 사이클 통합</span></p>
  </div>
</div>
</body>
</html>
