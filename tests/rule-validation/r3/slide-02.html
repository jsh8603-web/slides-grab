<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F0F4F8;
  overflow: hidden;
}
.slide {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  padding: 36pt 48pt 36pt 48pt;
}
.header { margin-bottom: 14pt; }
h1 {
  font-size: 20pt; font-weight: 700;
  color: #0D2137;
  line-height: 1.3;
  margin-bottom: 4pt;
}
.sub {
  font-size: 12pt; font-weight: 400;
  color: #7B8794;
}
.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10pt;
  margin-bottom: 14pt;
}
.metric {
  background: #FFFFFF;
  border-radius: 6pt;
  padding: 12pt;
  border-top: 3pt solid #00B4D8;
}
.metric-value {
  font-size: 24pt; font-weight: 800;
  color: #0D2137;
  margin-bottom: 2pt;
}
.metric-label {
  font-size: 10pt; font-weight: 500;
  color: #7B8794;
  line-height: 1.4;
}
.chart-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10pt;
  flex: 1; min-height: 0;
}
.chart-box {
  background: #FFFFFF;
  border-radius: 6pt;
  padding: 10pt;
}
.chart-title {
  font-size: 10pt; font-weight: 600;
  color: #0D2137;
  margin-bottom: 8pt;
}
.bar-row {
  display: flex; align-items: center;
  gap: 6pt;
  margin-bottom: 6pt;
}
.bar-label {
  font-size: 10pt; font-weight: 500;
  color: #1C1C1C;
  width: 60pt;
  flex-shrink: 0;
}
.bar-track {
  flex: 1; min-width: 0;
  height: 14pt;
  background: #E8EDF2;
  border-radius: 2pt;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: #00B4D8;
  border-radius: 2pt;
}
.bar-fill-accent {
  height: 100%;
  background: #0D2137;
  border-radius: 2pt;
}
.bar-value {
  font-size: 10pt; font-weight: 700;
  color: #0D2137;
  width: 36pt;
  text-align: right;
  flex-shrink: 0;
}
.source {
  font-size: 10pt; font-weight: 400;
  color: #7B8794;
  margin-top: auto;
}
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <h1><span>2030년까지 CAGR 35~48% — 시장은 이미 임계점을 넘었다</span></h1>
    <p class="sub"><span>디지털 트윈 시장 핵심 지표</span></p>
  </div>
  <div class="metrics">
    <div class="metric">
      <p class="metric-value"><span>$21B</span></p>
      <p class="metric-label"><span>2025년 시장 규모</span></p>
    </div>
    <div class="metric">
      <p class="metric-value"><span>$195B</span></p>
      <p class="metric-label"><span>2030년 시장 규모</span></p>
    </div>
    <div class="metric">
      <p class="metric-value"><span>75%</span></p>
      <p class="metric-label"><span>기업 투자 비율</span></p>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-box">
      <p class="chart-title"><span>산업별 CAGR</span></p>
      <div class="bar-row">
        <p class="bar-label"><span>제조업</span></p>
        <div class="bar-track"><div class="bar-fill" style="width:96%"></div></div>
        <p class="bar-value"><span>54%</span></p>
      </div>
      <div class="bar-row">
        <p class="bar-label"><span>전체 평균</span></p>
        <div class="bar-track"><div class="bar-fill" style="width:67%"></div></div>
        <p class="bar-value"><span>38%</span></p>
      </div>
      <div class="bar-row">
        <p class="bar-label"><span>대기업</span></p>
        <div class="bar-track"><div class="bar-fill-accent" style="width:60%"></div></div>
        <p class="bar-value"><span>67%</span></p>
      </div>
    </div>
    <div class="chart-box">
      <p class="chart-title"><span>지역별 CAGR</span></p>
      <div class="bar-row">
        <p class="bar-label"><span>아시아태평양</span></p>
        <div class="bar-track"><div class="bar-fill" style="width:100%"></div></div>
        <p class="bar-value"><span>56%</span></p>
      </div>
      <div class="bar-row">
        <p class="bar-label"><span>북미</span></p>
        <div class="bar-track"><div class="bar-fill" style="width:73%"></div></div>
        <p class="bar-value"><span>41%</span></p>
      </div>
      <div class="bar-row">
        <p class="bar-label"><span>유럽</span></p>
        <div class="bar-track"><div class="bar-fill" style="width:64%"></div></div>
        <p class="bar-value"><span>36%</span></p>
      </div>
    </div>
  </div>
  <p class="source"><span>Fortune Business Insights, MarketsandMarkets, Grand View Research</span></p>
</div>
</body>
</html>
