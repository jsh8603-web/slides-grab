<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F5F3EE;
  overflow: hidden;
}
.slide {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  padding: 36pt 48pt 36pt 48pt;
}
.header { margin-bottom: 14pt; }
h1 {
  font-size: 20pt; font-weight: 700;
  color: #1A2B4A;
  line-height: 1.3;
  margin-bottom: 4pt;
}
.sub {
  font-size: 12pt; font-weight: 400;
  color: #6B7A8D;
}
.flow {
  display: flex; flex-direction: column;
  align-items: center;
  gap: 6pt;
  margin-bottom: 12pt;
}
.flow-row {
  display: flex; align-items: center;
  gap: 8pt;
}
.flow-box {
  background: #1A2B4A;
  color: #FFFFFF;
  font-size: 10pt; font-weight: 600;
  padding: 6pt 12pt;
  border-radius: 4pt;
  text-align: center;
}
.flow-box-accent {
  background: #C8A96E;
  color: #1A2B4A;
}
.flow-box-light {
  background: #FFFFFF;
  color: #1A2B4A;
  border: 1pt solid #1A2B4A;
}
.flow-arrow {
  font-size: 14pt; color: #6B7A8D;
  line-height: 1;
}
.concepts {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12pt;
  flex: 1; min-height: 0;
}
.concept {
  background: #FFFFFF;
  border-radius: 6pt;
  padding: 12pt;
  border-left: 3pt solid #C8A96E;
}
.concept-title {
  font-size: 11pt; font-weight: 700;
  color: #1A2B4A;
  margin-bottom: 4pt;
}
.concept-desc {
  font-size: 10pt; font-weight: 400;
  color: #1C1C1C;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <h1><span>여러 AI가 협업해 복잡한 의사결정을 실행하는 시스템이다</span></h1>
    <p class="sub"><span>멀티에이전트 오케스트레이션의 작동 원리</span></p>
  </div>
  <div class="flow">
    <div class="flow-row">
      <div class="flow-box-accent"><span>사용자 목표 입력</span></div>
    </div>
    <div class="flow-arrow"><span>↓</span></div>
    <div class="flow-row">
      <div class="flow-box"><span>오케스트레이터 에이전트</span></div>
    </div>
    <div class="flow-arrow"><span>↓</span></div>
    <div class="flow-row">
      <div class="flow-box-light"><span>데이터 수집</span></div>
      <div class="flow-box-light"><span>분석·판단</span></div>
      <div class="flow-box-light"><span>외부 시스템</span></div>
    </div>
    <div class="flow-arrow"><span>↓</span></div>
    <div class="flow-row">
      <div class="flow-box"><span>결과 통합 → Human-on-the-loop 감독</span></div>
    </div>
  </div>
  <div class="concepts">
    <div class="concept">
      <p class="concept-title"><span>오케스트레이션</span></p>
      <p class="concept-desc"><span>목표를 서브태스크로 분해하고 에이전트에 배정하는 조율 메커니즘</span></p>
    </div>
    <div class="concept">
      <p class="concept-title"><span>거버넌스-as-code</span></p>
      <p class="concept-desc"><span>에이전트 행동 범위·권한·감사 로그를 코드로 정의하는 필수 체계</span></p>
    </div>
    <div class="concept">
      <p class="concept-title"><span>Human-on-the-loop</span></p>
      <p class="concept-desc"><span>인간이 전략적 감독자 역할로 전환 — 모든 직원이 에이전트 수퍼바이저</span></p>
    </div>
  </div>
</div>
</body>
</html>
