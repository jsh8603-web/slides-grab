<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F5F3EE;
  overflow: hidden;
}
.slide {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  padding: 36pt 48pt 36pt 48pt;
}
.header { margin-bottom: 18pt; }
h1 {
  font-size: 22pt; font-weight: 700;
  color: #1A2B4A;
  line-height: 1.3;
  margin-bottom: 4pt;
}
.sub {
  font-size: 12pt; font-weight: 400;
  color: #6B7A8D;
}
.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14pt;
  margin-bottom: 16pt;
}
.metric-card {
  background: #FFFFFF;
  border-radius: 6pt;
  padding: 18pt 14pt;
  text-align: center;
  border-top: 3pt solid #C8A96E;
}
.metric-num {
  font-size: 32pt; font-weight: 800;
  color: #1A2B4A;
  margin-bottom: 4pt;
}
.metric-label {
  font-size: 10pt; font-weight: 600;
  color: #C8A96E;
  margin-bottom: 4pt;
}
.metric-desc {
  font-size: 10pt; font-weight: 400;
  color: #6B7A8D;
  line-height: 1.4;
}
.bottom-bar {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12pt;
  margin-top: auto;
}
.bottom-item {
  display: flex; align-items: flex-start;
  gap: 6pt;
}
.bottom-dot {
  width: 6pt; height: 6pt;
  border-radius: 50%;
  background: #C8A96E;
  margin-top: 4pt;
  flex-shrink: 0;
}
.bottom-text {
  font-size: 10pt; color: #1C1C1C;
  line-height: 1.5;
}
.source {
  font-size: 10pt; color: #6B7A8D;
  margin-top: 8pt;
  font-style: italic;
}
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <h1><span>에이전트 AI는 선택이 아닌 생존 조건이 됐다</span></h1>
    <p class="sub"><span>글로벌 에이전트 AI 시장 전망 (2024 → 2030)</span></p>
  </div>
  <div class="metrics">
    <div class="metric-card">
      <p class="metric-num"><span>$120B</span></p>
      <p class="metric-label"><span>2030 시장 규모</span></p>
      <p class="metric-desc"><span>2024년 대비 약 10배 성장</span></p>
    </div>
    <div class="metric-card">
      <p class="metric-num"><span>80%</span></p>
      <p class="metric-label"><span>기업 앱 탑재율</span></p>
      <p class="metric-desc"><span>Deloitte 2026 예측</span></p>
    </div>
    <div class="metric-card">
      <p class="metric-num"><span>46%+</span></p>
      <p class="metric-label"><span>연평균 성장률</span></p>
      <p class="metric-desc"><span>전체 IT 시장의 5배</span></p>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="bottom-item">
      <div class="bottom-dot"></div>
      <p class="bottom-text"><span>78% 경영진 — "운영 모델 재설계 필요"</span></p>
    </div>
    <div class="bottom-item">
      <div class="bottom-dot"></div>
      <p class="bottom-text"><span>Google·MS·Salesforce 멀티에이전트 상용화 착수</span></p>
    </div>
  </div>
  <p class="source"><span>출처: Deloitte Global AI Agents Report 2026</span></p>
</div>
</body>
</html>
