<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}
.slide {
  width: 100%; height: 100%;
  position: relative;
}
.bg-img {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}
.overlay {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  background: #1B2A4A;
  opacity: 0.65;
}
.content {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 48pt 48pt 48pt 48pt;
}
h1 {
  font-size: 28pt; font-weight: 800;
  color: #FFFFFF;
  line-height: 1.3;
  margin-bottom: 10pt;
  text-shadow: 0 2px 8pt rgba(0,0,0,0.5);
}
.subtitle {
  font-size: 14pt; font-weight: 400;
  color: #FF6B35;
  line-height: 1.4;
  margin-bottom: 16pt;
  text-shadow: 0 1px 4pt rgba(0,0,0,0.4);
}
.date {
  font-size: 12pt; font-weight: 500;
  color: #FF6B35;
  text-shadow: 0 1px 4pt rgba(0,0,0,0.4);
}
</style>
</head>
<body>
<div class="slide">
  <img class="bg-img" src="assets/slide-01-image.png" alt="">
  <div class="overlay"></div>
  <div class="content">
    <h1><span>AI 에이전트는 도구가 아니다</span><br><span>— 판단하고, 실행하고, 학습하는 실리콘 동료다</span></h1>
    <p class="subtitle"><span>AI Agent Era: 비즈니스 임원이 알아야 할 전략적 전환점</span></p>
    <p class="date"><span>2026</span></p>
  </div>
</div>
</body>
</html>
