<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F5F5F0;
  overflow: hidden;
}
.slide {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  padding: 36pt 48pt 36pt 48pt;
}
.header { margin-bottom: 14pt; }
h1 {
  font-size: 18pt; font-weight: 700;
  color: #1B2A4A;
  line-height: 1.3;
  margin-bottom: 4pt;
}
.sub {
  font-size: 11pt; font-weight: 400;
  color: #8B8B8B;
}
.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10pt;
  margin-bottom: 14pt;
}
.metric-card {
  background: #FFFFFF;
  border-radius: 6pt;
  padding: 12pt;
  border-top: 3pt solid #FF6B35;
  text-align: center;
}
.metric-value {
  font-size: 28pt; font-weight: 800;
  color: #FF6B35;
  margin-bottom: 4pt;
}
.metric-label {
  font-size: 10pt; font-weight: 500;
  color: #1B2A4A;
  margin-bottom: 2pt;
}
.metric-desc {
  font-size: 10pt; font-weight: 400;
  color: #8B8B8B;
}
.charts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10pt;
  flex: 1; min-height: 0;
}
.chart-box {
  background: #FFFFFF;
  border-radius: 6pt;
  padding: 10pt;
}
.chart-title {
  font-size: 11pt; font-weight: 700;
  color: #1B2A4A;
  margin-bottom: 8pt;
}
.bar-row {
  display: flex; align-items: center; gap: 6pt;
  margin-bottom: 5pt;
}
.bar-label {
  font-size: 10pt; font-weight: 500;
  color: #2D2D2D;
  width: 70pt; flex-shrink: 0;
}
.bar-track {
  flex: 1; min-width: 0;
  height: 14pt;
  background: #E8E8E4;
  border-radius: 2pt;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: #FF6B35;
  border-radius: 2pt;
}
.bar-value {
  font-size: 10pt; font-weight: 700;
  color: #FF6B35;
  width: 36pt; text-align: right; flex-shrink: 0;
}
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <h1><span>시장은 이미 티핑 포인트를 넘었다</span></h1>
    <p class="sub"><span>Gartner · 시장 조사 기반 | 2025–2028 전망</span></p>
  </div>
  <div class="metrics">
    <div class="metric-card">
      <p class="metric-value"><span>$10.9B</span></p>
      <p class="metric-label"><span>2026 시장 규모</span></p>
      <p class="metric-desc"><span>2025 $7.6B 대비 +43%</span></p>
    </div>
    <div class="metric-card">
      <p class="metric-value"><span>45%+</span></p>
      <p class="metric-label"><span>시장 CAGR</span></p>
      <p class="metric-desc"><span>2025–2028 연평균 성장률</span></p>
    </div>
    <div class="metric-card">
      <p class="metric-value"><span>40%</span></p>
      <p class="metric-label"><span>기업 앱 에이전트 내장</span></p>
      <p class="metric-desc"><span>2025년 &lt;5% → 2026년 40%</span></p>
    </div>
  </div>
  <div class="charts">
    <div class="chart-box">
      <p class="chart-title"><span>에이전트 내장 비율 추이</span></p>
      <div class="bar-row">
        <p class="bar-label"><span>2025</span></p>
        <div class="bar-track"><div class="bar-fill" style="width:6%"></div></div>
        <p class="bar-value"><span>&lt;5%</span></p>
      </div>
      <div class="bar-row">
        <p class="bar-label"><span>2026</span></p>
        <div class="bar-track"><div class="bar-fill" style="width:50%"></div></div>
        <p class="bar-value"><span>40%</span></p>
      </div>
      <div class="bar-row">
        <p class="bar-label"><span>2028 목표</span></p>
        <div class="bar-track"><div class="bar-fill" style="width:100%"></div></div>
        <p class="bar-value"><span>80%</span></p>
      </div>
    </div>
    <div class="chart-box">
      <p class="chart-title"><span>선도 채택 산업</span></p>
      <div class="bar-row">
        <p class="bar-label"><span>고객 서비스</span></p>
        <div class="bar-track"><div class="bar-fill" style="width:90%"></div></div>
        <p class="bar-value"><span>선도</span></p>
      </div>
      <div class="bar-row">
        <p class="bar-label"><span>이커머스</span></p>
        <div class="bar-track"><div class="bar-fill" style="width:78%"></div></div>
        <p class="bar-value"><span>확장</span></p>
      </div>
      <div class="bar-row">
        <p class="bar-label"><span>운영 관리</span></p>
        <div class="bar-track"><div class="bar-fill" style="width:65%"></div></div>
        <p class="bar-value"><span>도입</span></p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
