<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F5F5F0;
  overflow: hidden;
}
.slide {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  padding: 36pt 48pt 36pt 48pt;
}
.header { margin-bottom: 14pt; }
h1 {
  font-size: 18pt; font-weight: 700;
  color: #1B2A4A;
  line-height: 1.3;
  margin-bottom: 4pt;
}
.sub {
  font-size: 11pt; font-weight: 400;
  color: #8B8B8B;
}
.causes {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10pt;
  margin-bottom: 14pt;
}
.cause {
  background: #FFFFFF;
  border-radius: 6pt;
  padding: 12pt;
  border-top: 3pt solid #FF6B35;
}
.cause-tag {
  display: inline-block;
  font-size: 10pt; font-weight: 700;
  color: #FF6B35;
  margin-bottom: 6pt;
}
.cause-title {
  font-size: 12pt; font-weight: 700;
  color: #1B2A4A;
  margin-bottom: 6pt;
}
.cause-item {
  font-size: 10pt; color: #2D2D2D;
  line-height: 1.5;
}
.bullet {
  color: #FF6B35;
  font-weight: 700;
}
.insight-box {
  background: #1B2A4A;
  border-radius: 6pt;
  padding: 12pt 14pt;
  display: flex; align-items: flex-start; gap: 10pt;
}
.insight-icon {
  font-size: 18pt; flex-shrink: 0;
  margin-top: 2pt;
  color: #FF6B35;
}
.insight-text {
  font-size: 11pt; font-weight: 400;
  color: #FFFFFF;
  line-height: 1.5;
}
.insight-bold {
  font-weight: 700;
  color: #FF6B35;
}
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <h1><span>69%가 실패하는 건 기술이 어려워서가 아니다</span></h1>
    <p class="sub"><span>AI 프로젝트 실패 해부 | 14%만이 배포 준비 완료</span></p>
  </div>
  <div class="causes">
    <div class="cause">
      <p class="cause-tag"><span>원인 1</span></p>
      <p class="cause-title"><span>전략 부재</span></p>
      <p class="cause-item"><span class="bullet">· </span><span>POC 성공 후 스케일업 좌초</span></p>
      <p class="cause-item"><span class="bullet">· </span><span>78% 임원 재설계 필요 인식</span></p>
    </div>
    <div class="cause">
      <p class="cause-tag"><span>원인 2</span></p>
      <p class="cause-title"><span>조직 준비도 부족</span></p>
      <p class="cause-item"><span class="bullet">· </span><span>배포 준비 완료 기업 14%</span></p>
      <p class="cause-item"><span class="bullet">· </span><span>데이터 · 거버넌스 · 인력 미비</span></p>
    </div>
    <div class="cause">
      <p class="cause-tag"><span>원인 3</span></p>
      <p class="cause-title"><span>변화관리 실패</span></p>
      <p class="cause-item"><span class="bullet">· </span><span>기술 완료, 현업 채택 저조</span></p>
      <p class="cause-item"><span class="bullet">· </span><span>"안 쓰는 AI"는 ROI 0</span></p>
    </div>
  </div>
  <div class="insight-box">
    <p class="insight-icon"><span>!</span></p>
    <p class="insight-text"><span class="insight-bold">14% vs 86%</span><span> — 준비 완료 기업은 ROI 171%+ 실현, 미준비 기업은 투자 손실. 전략과 실행이 성패를 가른다</span></p>
  </div>
</div>
</body>
</html>
