<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  position: relative;
  overflow: hidden;
  background: #0A2647;
}
.bg-img {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  object-fit: cover;
}
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: #0A2647; opacity: 0.55;
}
.content {
  position: relative; z-index: 2;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 48pt 56pt 56pt 56pt;
}
.tag {
  display: inline-block;
  background: #00BCD4;
  color: #FFFFFF;
  font-size: 11pt; font-weight: 600;
  padding: 4pt 12pt;
  border-radius: 3pt;
}
.tag-wrap {
  margin-bottom: 16pt;
}
h1 {
  font-size: 48pt; font-weight: 800;
  color: #FFFFFF;
  line-height: 1.2;
  text-shadow: 0 2px 8pt rgba(0,0,0,0.5);
  margin-bottom: 8pt;
}
.subtitle {
  font-size: 22pt; font-weight: 400;
  color: #B0C4DE;
  text-shadow: 0 1px 4pt rgba(0,0,0,0.4);
  margin-bottom: 24pt;
}
.meta {
  font-size: 12pt; font-weight: 400;
  color: #8BAAC4;
}
</style>
</head>
<body>
<img class="bg-img" src="assets/slide-01-cover.png" alt="해저 데이터센터 표지">
<div class="overlay"></div>
<div class="content">
  <div class="tag-wrap"><div class="tag"><span>INFRASTRUCTURE INSIGHT</span></div></div>
  <h1><span>해저 데이터센터</span></h1>
  <p class="subtitle"><span>바다 속 서버의 시대</span></p>
  <p class="meta"><span>2026.03 | ICT 인프라 전략 브리핑</span></p>
</div>
</body>
</html>
