<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F8FAFC;
  overflow: hidden;
}
.slide {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  padding: 36pt 48pt 36pt 48pt;
}
.header { margin-bottom: 16pt; }
h1 {
  font-size: 26pt; font-weight: 700;
  color: #0A2647;
  line-height: 1.3;
  margin-bottom: 4pt;
}
.sub {
  font-size: 13pt; font-weight: 400;
  color: #64748B;
}
.cards {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14pt;
  flex: 1; min-height: 0;
}
.card {
  background: #FFFFFF;
  border-radius: 6pt;
  padding: 16pt 14pt;
  display: flex; flex-direction: column;
  border-top: 3pt solid #2196F3;
  overflow: hidden;
}
.card-flag {
  font-size: 10pt; font-weight: 600;
  color: #64748B;
  margin-bottom: 4pt;
}
.card-name {
  font-size: 14pt; font-weight: 700;
  color: #0A2647;
  margin-bottom: 8pt;
}
.card-type {
  display: inline-block;
  font-size: 10pt; font-weight: 600;
  padding: 2pt 8pt;
  border-radius: 3pt;
  margin-bottom: 10pt;
}
.type-end { background: #E2E8F0; color: #475569; }
.type-active { background: #DCFCE7; color: #166534; }
.type-build { background: #DBEAFE; color: #1E40AF; }
.card-stats { margin-top: auto; }
.stat-row {
  display: flex; justify-content: space-between;
  align-items: center;
  padding: 4pt 0;
  border-bottom: 1pt solid #F1F5F9;
}
.stat-row:last-child { border-bottom: none; }
.stat-label {
  font-size: 10pt; color: #64748B;
}
.stat-value {
  font-size: 12pt; font-weight: 700;
  color: #2196F3;
}
.stat-value-muted {
  font-size: 12pt; font-weight: 500;
  color: #94A3B8;
}
.timeline-bar {
  margin-top: 12pt;
  display: flex; align-items: center;
  gap: 0;
  height: 28pt;
}
.tl-node {
  display: flex; flex-direction: column;
  align-items: center;
  flex: 1;
}
.tl-dot {
  width: 10pt; height: 10pt;
  border-radius: 50%;
  background: #2196F3;
  margin-bottom: 4pt;
}
.tl-dot-active { background: #00BCD4; }
.tl-label {
  font-size: 10pt; font-weight: 600;
  color: #0A2647;
}
.tl-line {
  flex: 2;
  height: 2pt;
  background: #CBD5E1;
  margin-bottom: 14pt;
}
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <h1><span>글로벌 선두주자들이 먼저 뛰어들었다</span></h1>
    <p class="sub"><span>Microsoft Natick · 중국 하이난 · 상하이 린강</span></p>
  </div>
  <div class="cards">
    <div class="card">
      <p class="card-flag"><span>미국 Microsoft</span></p>
      <p class="card-name"><span>Project Natick</span></p>
      <span class="card-type type-end">2024 종료</span>
      <div class="card-stats">
        <div class="stat-row">
          <span class="stat-label"><span>기간</span></span>
          <span class="stat-value-muted"><span>2018~2020</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label"><span>고장률</span></span>
          <span class="stat-value"><span>지상의 1/8</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label"><span>냉각절감</span></span>
          <span class="stat-value"><span>45%</span></span>
        </div>
      </div>
    </div>
    <div class="card">
      <p class="card-flag"><span>중국 하이난</span></p>
      <p class="card-name"><span>상용 클러스터</span></p>
      <span class="card-type type-active">운영 중</span>
      <div class="card-stats">
        <div class="stat-row">
          <span class="stat-label"><span>가동</span></span>
          <span class="stat-value-muted"><span>2023~</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label"><span>성격</span></span>
          <span class="stat-value"><span>세계 최초</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label"><span>특화</span></span>
          <span class="stat-value"><span>AI 인프라</span></span>
        </div>
      </div>
    </div>
    <div class="card">
      <p class="card-flag"><span>중국 상하이</span></p>
      <p class="card-name"><span>린강 프로젝트</span></p>
      <span class="card-type type-build">건설 중</span>
      <div class="card-stats">
        <div class="stat-row">
          <span class="stat-label"><span>투자</span></span>
          <span class="stat-value"><span>EUR 195M</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label"><span>PUE</span></span>
          <span class="stat-value"><span>1.15 이하</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label"><span>녹색전력</span></span>
          <span class="stat-value"><span>97%</span></span>
        </div>
      </div>
    </div>
  </div>
  <div class="timeline-bar">
    <div class="tl-node">
      <div class="tl-dot"></div>
      <span class="tl-label"><span>2018</span></span>
    </div>
    <div class="tl-line"></div>
    <div class="tl-node">
      <div class="tl-dot"></div>
      <span class="tl-label"><span>2020</span></span>
    </div>
    <div class="tl-line"></div>
    <div class="tl-node">
      <div class="tl-dot tl-dot-active"></div>
      <span class="tl-label"><span>2023</span></span>
    </div>
    <div class="tl-line"></div>
    <div class="tl-node">
      <div class="tl-dot tl-dot-active"></div>
      <span class="tl-label"><span>현재</span></span>
    </div>
  </div>
</div>
</body>
</html>
