<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>PF-63+64 combo: table + flex-wrap pills</title></head>
<body style="width:960px;height:540px;margin:0;font-family:Pretendard,sans-serif;background:#fff;">
  <div style="padding:40px;">
    <h2 style="font-size:28px;color:#333;">복합: 테이블 + Pill</h2>
    <table style="width:100%;margin-bottom:16px;">
      <tr><td style="padding:8px;border:1px solid #ddd;">데이터</td><td style="padding:8px;border:1px solid #ddd;">값</td></tr>
    </table>
    <div style="display:flex;flex-wrap:wrap;gap:8px;">
      <span style="padding:6px 16px;border-radius:20px;background:#e3f2fd;font-size:16px;color:#1565c0;">태그A</span>
      <span style="padding:6px 16px;border-radius:20px;background:#e8f5e9;font-size:16px;color:#2e7d32;">태그B</span>
      <span style="padding:6px 16px;border-radius:20px;background:#fff3e0;font-size:16px;color:#e65100;">태그C</span>
      <span style="padding:6px 16px;border-radius:20px;background:#fce4ec;font-size:16px;color:#c62828;">태그D</span>
      <span style="padding:6px 16px;border-radius:20px;background:#f3e5f5;font-size:16px;color:#6a1b9a;">태그E</span>
    </div>
  </div>
</body></html>
