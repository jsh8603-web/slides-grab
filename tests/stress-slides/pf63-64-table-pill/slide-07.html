<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>PF-64 FP: flex nowrap (not wrap)</title></head>
<body style="width:960px;height:540px;margin:0;font-family:Pretendard,sans-serif;background:#fff;">
  <div style="padding:40px;">
    <h2 style="font-size:28px;color:#333;">Flex nowrap 레이아웃</h2>
    <div style="display:flex;gap:8px;">
      <span style="padding:6px 16px;border-radius:20px;background:#e3f2fd;font-size:16px;color:#1565c0;">A</span>
      <span style="padding:6px 16px;border-radius:20px;background:#e8f5e9;font-size:16px;color:#2e7d32;">B</span>
      <span style="padding:6px 16px;border-radius:20px;background:#fff3e0;font-size:16px;color:#e65100;">C</span>
      <span style="padding:6px 16px;border-radius:20px;background:#fce4ec;font-size:16px;color:#c62828;">D</span>
      <span style="padding:6px 16px;border-radius:20px;background:#f3e5f5;font-size:16px;color:#6a1b9a;">E</span>
      <span style="padding:6px 16px;border-radius:20px;background:#e0f7fa;font-size:16px;color:#00695c;">F</span>
    </div>
  </div>
</body></html>
