<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><style>* { margin:0; padding:0; box-sizing:border-box; } body { font-family:'Pretendard',sans-serif; }</style></head>
<body style="width:720pt;height:405pt;margin:0;padding:0;overflow:hidden;">
<div style="width:720pt;height:405pt;background:#FFFFFF;padding:36pt;padding-bottom:36pt;display:flex;flex-direction:column;">
  <h2 style="font-size:24pt;font-weight:700;color:#1B2A4A;margin-bottom:20pt;text-align:center;">AI 도입 단계별 비교</h2>
  <div style="flex:1;box-sizing:border-box;min-width:0;display:flex;flex-direction:column;">
    <table style="width:100%;border-collapse:collapse;font-size:16pt;">
      <thead>
        <tr>
          <th style="background:#1B2A4A;color:#FFFFFF;padding:10pt 12pt;text-align:left;font-weight:600;">단계</th>
          <th style="background:#1B2A4A;color:#FFFFFF;padding:10pt 12pt;text-align:left;font-weight:600;">주요 활동</th>
          <th style="background:#1B2A4A;color:#FFFFFF;padding:10pt 12pt;text-align:left;font-weight:600;">기간</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td style="background:#F5F7FA;padding:10pt 12pt;color:#2D3436;">탐색</td>
          <td style="background:#F5F7FA;padding:10pt 12pt;color:#2D3436;">유즈케이스 발굴 및 PoC</td>
          <td style="background:#F5F7FA;padding:10pt 12pt;color:#2D3436;">1-3개월</td>
        </tr>
        <tr>
          <td style="background:#FFFFFF;padding:10pt 12pt;color:#2D3436;">파일럿</td>
          <td style="background:#FFFFFF;padding:10pt 12pt;color:#2D3436;">소규모 팀 적용 및 검증</td>
          <td style="background:#FFFFFF;padding:10pt 12pt;color:#2D3436;">3-6개월</td>
        </tr>
        <tr>
          <td style="background:#F5F7FA;padding:10pt 12pt;color:#2D3436;">확산</td>
          <td style="background:#F5F7FA;padding:10pt 12pt;color:#2D3436;">전사 확대 및 통합</td>
          <td style="background:#F5F7FA;padding:10pt 12pt;color:#2D3436;">6-12개월</td>
        </tr>
        <tr>
          <td style="background:#FFFFFF;padding:10pt 12pt;color:#2D3436;">최적화</td>
          <td style="background:#FFFFFF;padding:10pt 12pt;color:#2D3436;">성과 측정 및 고도화</td>
          <td style="background:#FFFFFF;padding:10pt 12pt;color:#2D3436;">지속</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
