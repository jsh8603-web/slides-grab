<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><style>* { margin:0; padding:0; box-sizing:border-box; } body { font-family:'Pretendard',sans-serif; }</style></head>
<body style="width:720pt;height:405pt;margin:0;padding:0;overflow:hidden;">
<div style="width:720pt;height:405pt;background:#FFFFFF;padding:36pt;padding-bottom:36pt;display:flex;flex-direction:column;">
  <h2 style="font-size:24pt;font-weight:700;color:#1B2A4A;margin-bottom:20pt;text-align:center;">핵심 AI 기술 영역</h2>
  <div style="flex:1;box-sizing:border-box;min-width:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:12pt;">
    <div style="background:#F5F7FA;border-radius:8pt;padding:16pt;display:flex;flex-direction:column;justify-content:center;">
      <h3 style="font-size:18pt;font-weight:700;color:#1B2A4A;margin-bottom:8pt;">자연어 처리</h3>
      <p style="font-size:16pt;color:#2D3436;line-height:1.5;">LLM 기반 텍스트 생성, 요약, 번역 기술의 고도화</p>
    </div>
    <div style="background:#F5F7FA;border-radius:8pt;padding:16pt;display:flex;flex-direction:column;justify-content:center;">
      <h3 style="font-size:18pt;font-weight:700;color:#1B2A4A;margin-bottom:8pt;">컴퓨터 비전</h3>
      <p style="font-size:16pt;color:#2D3436;line-height:1.5;">이미지 인식, 객체 탐지 및 영상 분석 기술</p>
    </div>
    <div style="background:#F5F7FA;border-radius:8pt;padding:16pt;display:flex;flex-direction:column;justify-content:center;">
      <h3 style="font-size:18pt;font-weight:700;color:#1B2A4A;margin-bottom:8pt;">강화 학습</h3>
      <p style="font-size:16pt;color:#2D3436;line-height:1.5;">의사결정 최적화 및 자율 시스템 제어</p>
    </div>
    <div style="background:#F5F7FA;border-radius:8pt;padding:16pt;display:flex;flex-direction:column;justify-content:center;">
      <h3 style="font-size:18pt;font-weight:700;color:#1B2A4A;margin-bottom:8pt;">멀티모달 AI</h3>
      <p style="font-size:16pt;color:#2D3436;line-height:1.5;">텍스트, 이미지, 음성 통합 처리 모델</p>
    </div>
  </div>
</div>
</body>
</html>
